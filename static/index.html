/* ═══ RECIPIENT RISK REGISTRY (Network-wide) ═══ */
const RecipientRiskRegistry = new Map(); // number -> {count: 0, reports: []}

function incRecipientRisk(number) {
  if (!RecipientRiskRegistry.has(number)) {
    RecipientRiskRegistry.set(number, { count: 0, reports: [] });
  }
  RecipientRiskRegistry.get(number).count += 1;
}

function getRecipientRisk(number) {
  return RecipientRiskRegistry.get(number)?.count || 0;
}

function reportRecipient(reporter, target, amount, reason) {
  if (!RecipientRiskRegistry.has(target)) {
    RecipientRiskRegistry.set(target, { count: 0, reports: [] });
  }
  const entry = RecipientRiskRegistry.get(target);
  entry.count += 2;
  entry.reports.push({ reporter, amount, reason, time: new Date() });
}

let _gbmModel = null;
function _loadGBM() {
  if (_gbmModel) return _gbmModel;
  try { _gbmModel = JSON.parse(atob(_GBM_B64));
    console.log('[PayTrust ML] GBM loaded: ' + _gbmModel.trees.length + ' trees, AUC=' + _gbmModel.auc);
    return _gbmModel; }
  catch(e) { console.warn('[PayTrust ML] load failed:', e); return null; }
}

function _gbmPredict(features) {
  const m = _loadGBM(); if (!m) return null;
  function traverse(node) {
    if (typeof node === 'number') return node;
    return features[node[0]] <= node[1] ? traverse(node[2]) : traverse(node[3]);
  }
  let score = m.init;
  for (const tree of m.trees) score += m.lr * traverse(tree);
  return 1 / (1 + Math.exp(-score));
}

function buildMLFeatures(user, amount, receiverNum) {
  const bal        = Math.max(user.balance || 1, 1);
  const avg        = calculateAvgTransaction(user);
  const std        = calculateStdDeviation(user, avg);
  const hour       = new Date().getHours();
  const inContacts = receiverNum in (user.contacts || {});
  const inHistory  = user.known_recipients?.has(receiverNum) || false;
  const inUPI      = receiverNum in USERS;
  const spentToday = getDailySpent(user);
  const startBal   = Math.max(bal + spentToday, 1);
  const z          = std > 0 ? Math.abs(amount - avg) / std : 0;
  return [
    Math.min(amount / bal, 1.0),
    (hour>=1&&hour<5)?1.0:(hour>=22||hour<7)?0.5:0.0,
    (!inContacts && !inHistory) ? 1.0 : 0.0,
    Math.min(getRecentTransactions(user,5).length / 10, 1.0),
    Math.min((spentToday + amount) / startBal, 1.0),
    (amount / bal) > 0.50 ? 1.0 : 0.0,
    Math.min(getRecipientRisk(receiverNum) / 10, 1.0),
    Math.min(z / 4, 1.0),
    inUPI ? 0.0 : 1.0,
  ];
}

function mlFraudScore(user, amount, receiverNum) {
  try { return _gbmPredict(buildMLFeatures(user, amount, receiverNum)); }
  catch(e) { console.warn('[PayTrust ML] inference error:', e); return null; }
}

// Typo variants map for fuzzy matching (Levenshtein ≤ 2)
const TYPO_MAP = {
  refnd: "refund", refudn: "refund", rfund: "refund",
  suport: "support", supprt: "support", supoprt: "support",
  cliam: "claim", claime: "claim",

  offr: "offer", offfer: "offer",
  quik: "quick", quck: "quick",
  servic: "service", srvice: "service",
};

/**
 * Levenshtein distance — used only as a safety net fallback.
 */
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, (_, i) =>
    Array.from({length: n + 1}, (_, j) => i === 0 ? j : j === 0 ? i : 0)
  );
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

/**
 * Resolve a token to a canonical suspicious keyword (or null).
 * Checks: exact match → typo map → Levenshtein ≤ 2 against all keywords.
 */
function resolveToken(token) {
  if (KEYWORD_WEIGHTS[token]) return token;
  if (TYPO_MAP[token] && KEYWORD_WEIGHTS[TYPO_MAP[token]]) return TYPO_MAP[token];
  // Fuzzy: only check if token length is close to keyword length
  for (const kw of Object.keys(KEYWORD_WEIGHTS)) {
    if (Math.abs(token.length - kw.length) <= 2 && levenshtein(token, kw) <= 2)
      return kw;
  }
  return null;
}

/**
 * Split a UPI local-part into tokens using:
 *   - numbers, underscores, dots as delimiters
 *   - camelCase splits (e.g. "rahulRefund" → ["rahul","Refund"])
 */
function tokenizeUPI(localPart) {
  // camelCase split first
  const camelSplit = localPart.replace(/([a-z])([A-Z])/g, '$1 $2');
  // then split on non-alpha chars
  const raw = camelSplit.split(/[\d_.\-\s]+/).filter(Boolean);
  return raw.map(t => t.toLowerCase()).filter(t => t.length >= 2);
}

/**
 * Main analysis function.
 * @param {string} upiId  full UPI ID e.g. "rahulrefund@upi"
 * @returns {{ keywordScore: number, signals: string[], matchedKeywords: {word,canonical,tier}[] }}
 */
function analyzeUPIKeywords(upiId) {
  if (!upiId || !upiId.includes("@")) return { keywordScore: 0, signals: [], matchedKeywords: [] };
  const localPart = upiId.split("@")[0];
  const tokens = tokenizeUPI(localPart);

  const seen = new Set();
  const matched = [];
  let rawScore = 0;

  for (const token of tokens) {
    if (COMMON_NAMES.has(token)) continue;  // skip benign names
    const canonical = resolveToken(token);
    if (canonical && !seen.has(canonical)) {
      seen.add(canonical);
      const meta = KEYWORD_WEIGHTS[canonical];
      matched.push({ word: token, canonical, tier: meta.tier, score: meta.score, desc: meta.desc });
      rawScore += meta.score;
    }
  }

  // Cap keyword contribution at 50
  const keywordScore = Math.min(rawScore, 50);
  const signals = [];

  if (matched.length === 0) return { keywordScore: 0, signals: [], matchedKeywords: [] };

  const highRisk  = matched.filter(m => m.tier === "high");
  const medRisk   = matched.filter(m => m.tier === "medium");

  if (matched.length >= 2) {
    const names = matched.map(m => `"${m.canonical}"`).join(", ");
    signals.push(`⚠️ Multiple suspicious keywords detected in UPI ID: ${names}`);
  } else if (highRisk.length === 1) {
    const kw = highRisk[0];
    const display = kw.word !== kw.canonical ? `"${kw.word}" (≈${kw.canonical})` : `"${kw.canonical}"`;
    signals.push(`⚠️ Suspicious keyword detected in UPI ID: ${display}`);
    signals.push(`⚠️ UPI ID contains high-risk financial term often used in scams (${kw.desc})`);
  } else if (medRisk.length >= 1) {
    const kw = medRisk[0];
    const display = kw.word !== kw.canonical ? `"${kw.word}" (≈${kw.canonical})` : `"${kw.canonical}"`;
    signals.push(`⚠️ Suspicious keyword in UPI ID: ${display} — commonly used in payment lure scams`);
  } else {
    const kw = matched[0];
    signals.push(`⚠️ UPI ID contains the term "${kw.canonical}" — verify recipient identity`);
  }

  return { keywordScore, signals, matchedKeywords: matched };
}

/* ═══ FRAUD DETECTION ENGINE ═══ */
const ODD_HOUR_START = 1;
const ODD_HOUR_END = 5;
const FREEZE_BLOCK_COUNT = 10;
const FREEZE_WINDOW_SEC = 180;
const COOLDOWN_SEC = 60;
const MAX_DAILY_FREEZE = 5;
const OTP_DISCOUNT = 15;

function isOddHour(date = new Date()) {
  const hour = date.getHours();
  return hour >= ODD_HOUR_START && hour < ODD_HOUR_END;
}

function getRecentTransactions(user, minutes) {
  const now = new Date();
  const cutoff = new Date(now.getTime() - minutes * 60000);
  return (user.transactions || []).filter(tx => {
    if (!tx.date || !tx.time) return false;
    const txDate = new Date(`${tx.date} ${tx.time}`);
    return txDate > cutoff;
  });
}

function calculateAvgTransaction(user) {
  const txs = user.transactions || [];
  if (txs.length === 0) return 1000;
  const sum = txs.reduce((s, t) => s + t.amt, 0);
  return sum / txs.length;
}

function calculateStdDeviation(user, avg) {
  const txs = user.transactions || [];
  if (txs.length < 2) return avg * 0.5;
  const squaredDiffs = txs.map(t => Math.pow(t.amt - avg, 2));
  const variance = squaredDiffs.reduce((s, d) => s + d, 0) / txs.length;
  return Math.sqrt(variance);
}

function getDailySpent(user) {
  const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'2-digit'}).replace(/ /g,' ');
  return (user.transactions || [])
    .filter(tx => tx.date === today && tx.type === 'debit' && tx.status !== 'blocked')
    .reduce((s, t) => s + t.amt, 0);
}

function behaviouralDeviation(user, amount) {
  const avg = calculateAvgTransaction(user);
  const std = calculateStdDeviation(user, avg);
  if (std === 0) return { risk: 0, signals: [] };
  
  const zScore = Math.abs(amount - avg) / std;
  if (zScore > 3.5) {
    return {
      risk: 12,
      signals: [`Amount ₹${amount.toLocaleString()} is unusually far outside your typical range (avg ₹${avg.toLocaleString()} ± ₹${std.toLocaleString()})`]
    };
  }
  return { risk: 0, signals: [] };
}

function scamPatternCheck(user, amount, receiverNum) {
  const avg = calculateAvgTransaction(user);
  const bal = user.balance;
  const inContacts = receiverNum in (user.contacts || {});
  const inHistory = user.known_recipients?.has(receiverNum) || false;
  const inUPI = receiverNum in USERS;
  
  const isUnknown = !inContacts && !inHistory;
  const isLarge = amount > 8 * avg;
  const drainsBalance = amount > 0.65 * bal;
  const oddHour = isOddHour();
  
  let signals = 0;
  const reasons = [];
  
  if (isUnknown) { signals++; reasons.push("Recipient is not in your contacts or transaction history."); }
  if (isLarge) { signals++; reasons.push(`Amount ₹${amount.toLocaleString()} is much higher than your usual payments.`); }
  if (drainsBalance) { signals++; reasons.push(`This would use ${Math.round(amount/bal*100)}% of your current balance.`); }
  if (!inUPI) { signals += 2; reasons.push("⚠️ Recipient UPI ID is not registered in the network — high scam risk."); }
  if (oddHour) { signals++; reasons.push("Transaction attempted during late-night hours."); }
  
  if (signals >= 3) {
    reasons.push("If someone asked you to make this payment, please verify first.");
    return { risk: 30, autoBlock: true, signals: reasons };
  }
  if (signals === 2 && amount > 0.5 * bal) {
    return { risk: 10, autoBlock: false, signals: ["Multiple risk signals active on this payment — please review carefully."] };
  }
  return { risk: 0, autoBlock: false, signals: [] };
}

function checkMicroPaymentAttack(user) {
  const recent1min = getRecentTransactions(user, 1).filter(tx => tx.amt >= 1 && tx.amt <= 50);
  const recent2min = getRecentTransactions(user, 2).filter(tx => tx.amt >= 1 && tx.amt <= 50);
  
  if (recent1min.length >= 10) {
    return {
      attack: true,
      risk: 60,
      signal: `🚨 ${recent1min.length} rapid small payments (₹1–₹50) in 1 minute.`
    };
  }
  if (recent2min.length >= 12) {
    return {
      attack: true,
      risk: 55,
      signal: `🚨 ${recent2min.length} rapid small payments in 2 minutes.`
    };
  }
  return { attack: false, risk: 0, signal: null };
}

function checkRapidLargeTransfers(user, amount) {
  const avg = calculateAvgTransaction(user);
  const recent2min = getRecentTransactions(user, 2).filter(tx => tx.amt > avg * 1.4);
  const recent3min = getRecentTransactions(user, 3).filter(tx => tx.amt > avg * 1.4);
  const total3min = recent3min.reduce((s, t) => s + t.amt, 0);
  const bal = user.balance;
  
  if (recent3min.length >= 4 && total3min > bal * 0.4) {
    return {
      risk: 38,
      signal: `Multiple rapid transfers: ${recent3min.length} large payments totalling ₹${total3min.toLocaleString()} in 3 minutes.`
    };
  }
  if (recent2min.length >= 3 && total3min > bal * 0.35) {
    return {
      risk: 22,
      signal: `${recent2min.length} large payments in 2 minutes — monitoring.`
    };
  }
  return { risk: 0, signal: null };
}

function calculateRisk(user, amount, receiverNum) {
  let risk = 0;
  const signals = [];
  const bal = user.balance;
  const avg = calculateAvgTransaction(user);
  
  // 1. Micro-payment attack
  const micro = checkMicroPaymentAttack(user);
  if (micro.attack) {
    risk += micro.risk;
    signals.push(micro.signal);
    incRecipientRisk(receiverNum);
    return { risk, signals, action: 'cooldown' };
  }
  
  // 2. Rapid large transfers
  const rapid = checkRapidLargeTransfers(user, amount);
  if (rapid.risk > 0) {
    risk += rapid.risk;
    signals.push(rapid.signal);
    incRecipientRisk(receiverNum);
  }
  
  // 3. Balance drain
  const balPct = (amount / bal) * 100;
  if (balPct > 80) {
    risk += 30;
    signals.push(`This transaction drains ${balPct.toFixed(0)}% of your balance.`);
  } else if (balPct > 65) {
    risk += 16;
    signals.push(`Large transfer: ${balPct.toFixed(0)}% of your current balance.`);
  }
  
  // 4. Recipient checks - FIXED: Only show new recipient signal if truly new
  const inUPI = receiverNum in USERS;
  const inContacts = receiverNum in (user.contacts || {});
  const inHistory = user.known_recipients?.has(receiverNum) || false;
  
  if (!inUPI) {
    signals.push("ℹ️ Sending to a number outside the UPI network — verify before proceeding.");
  } else if (!inContacts && !inHistory) {
    risk += 8;
    signals.push("New recipient — not seen in your contacts or history.");
  }
  
  // 5. Daily spending
  const spentToday = getDailySpent(user);
  const startBal = bal + spentToday;
  if (startBal > 0) {
    const dailyPct = ((spentToday + amount) / startBal) * 100;
    if (dailyPct >= 88) {
      risk += 15;
      signals.push(`Daily spending would reach ${dailyPct.toFixed(0)}% of your starting balance.`);
    } else if (dailyPct >= 75) {
      risk += 7;
      signals.push(`Daily spending at ${dailyPct.toFixed(0)}% of starting balance.`);
    }
  }
  
  // 6. Recipient risk registry
  const recRisk = getRecipientRisk(receiverNum);
  if (recRisk >= 4) {
    risk += 18;
    signals.push(`⚠️ Recipient flagged in ${recRisk} suspicious patterns network-wide.`);
  } else if (recRisk >= 2) {
    risk += 8;
    signals.push(`Recipient has ${recRisk} previous flagged pattern(s).`);
  }
  
  // 7. Odd hour
  if (isOddHour() && risk > 0) {
    risk += 8;
    signals.push(`Late-night transaction (${ODD_HOUR_START}AM–${ODD_HOUR_END}AM).`);
  }
  
  // 8. Behavioural deviation
  const behav = behaviouralDeviation(user, amount);
  risk += behav.risk;
  signals.push(...behav.signals);
  
  // 9. Trust reduction for contacts - This is applied after collecting signals
  // We need to track original risk for signal generation, then reduce for final risk
  let finalRisk = risk;
  if (receiverNum in (user.contacts || {})) {
    finalRisk = Math.floor(risk * 0.75);
  } else if (user.known_recipients?.has(receiverNum)) {
    finalRisk = Math.floor(risk * 0.88);
  }
  
  // 10. Scam pattern
  const scam = scamPatternCheck(user, amount, receiverNum);
  finalRisk += scam.risk;
  signals.push(...scam.signals);
  
  const totalRisk = user.risk_score + finalRisk;
  
  if (totalRisk >= RISK_BLOCK) {
    return { risk: finalRisk, signals, action: 'block' };
  }
  if (totalRisk >= RISK_OTP) {
    return { risk: finalRisk, signals, action: 'otp' };
  }
  if (totalRisk >= RISK_INFO) {
    return { risk: finalRisk, signals, action: 'info' };
  }
  return { risk: finalRisk, signals, action: 'allow' };
}

/* ═══ FREEZE MANAGEMENT ═══ */
function checkFrozen(user) {
  if (user.permanent_frozen) {
    return { frozen: true, message: "Your account is locked. Please visit a branch to reactivate." };
  }
  if (user.frozen_until && new Date() < new Date(user.frozen_until)) {
    const remaining = Math.ceil((new Date(user.frozen_until) - new Date()) / 1000);
    const mins = Math.floor(remaining / 60);
    const secs = remaining % 60;
    return { frozen: true, message: `Account paused for your safety. Try again in ${mins}m ${secs}s.`, remaining };
  }
  return { frozen: false };
}

function checkCooldown(user) {
  if (user.cooldown_until && new Date() < new Date(user.cooldown_until)) {
    const remaining = Math.ceil((new Date(user.cooldown_until) - new Date()) / 1000);
    return { cooldown: true, remaining };
  }
  return { cooldown: false };
}

function applyCooldown(user, reason) {
  user.cooldown_until = new Date(Date.now() + COOLDOWN_SEC * 1000).toISOString();
  user.blocked_attempts = (user.blocked_attempts || 0) + 1;
  return { cooldown: true, remaining: COOLDOWN_SEC, reason };
}

function recordBlock(user) {
  const now = new Date();
  if (!user.recent_blocks) user.recent_blocks = [];
  user.recent_blocks.push(now);
  user.recent_blocks = user.recent_blocks.filter(t => 
    (now - new Date(t)) / 1000 <= FREEZE_WINDOW_SEC
  );
  return user.recent_blocks.length >= FREEZE_BLOCK_COUNT;
}

function recordBypassAttempt(user) {
  user.bypass_attempts = (user.bypass_attempts || 0) + 1;
  return user.bypass_attempts >= 3;
}

function freezeAccount(user, reason, minutes = 5) {
  const today = new Date().toDateString();
  if (!user.daily_freeze_log) user.daily_freeze_log = [];
  
  const todayFreezes = user.daily_freeze_log.filter(d => 
    new Date(d).toDateString() === today
  ).length;
  
  if (todayFreezes >= MAX_DAILY_FREEZE) {
    user.permanent_frozen = true;
    return { frozen: true, permanent: true, message: "Multiple suspicious activities detected today. Please visit your nearest branch." };
  }
  
  user.daily_freeze_log.push(new Date().toISOString());
  user.freeze_count = (user.freeze_count || 0) + 1;
  user.frozen_until = new Date(Date.now() + minutes * 60000).toISOString();
  user.blocked_attempts = (user.blocked_attempts || 0) + 1;
  
  return { 
    frozen: true, 
    minutes, 
    message: reason,
    remainingToday: MAX_DAILY_FREEZE - todayFreezes - 1
  };
}

function emergencyLock(user) {
  user.permanent_frozen = true;
  user.freeze_count = (user.freeze_count || 0) + 1;
  if (!user.daily_freeze_log) user.daily_freeze_log = [];
  user.daily_freeze_log.push(new Date().toISOString());
  return { locked: true };
}

/* ═══ BTN ═══ */
function Btn({children,onClick,variant="primary",disabled,style={},fullWidth}){
  const vars={
    primary:{background:disabled?"#93c5fd":`linear-gradient(135deg,${B},${B2})`,color:"#fff",
      boxShadow:disabled?"none":"0 4px 16px rgba(0,120,255,.28)"},
    secondary:{background:BL,color:B,border:"none"},
    ghost:{background:"transparent",color:"#64748b",border:"1px solid #e2e8f0"},
    danger:{background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca"},
  };
  return(
    <button onClick={disabled?undefined:onClick} disabled={disabled}
      className={variant==="primary"?"btn-primary":""}
      style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:7,
        fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:14,
        cursor:disabled?"not-allowed":"pointer",border:"none",borderRadius:12,
        padding:"11px 22px",outline:"none",width:fullWidth?"100%":"auto",
        ...vars[variant],...style}}>
      {children}
    </button>
  );
}

/* ═══ LOGIN PAGE ═══ */
function LoginPage({onLogin}){
  const[mobile,setMobile]=useState("");
  const[pin,setPin]=useState("");
  const[showPin,setShowPin]=useState(false);
  const[otp,setOtp]=useState("");
  const[otpMode,setOtpMode]=useState(false);
  const[msg,setMsg]=useState({text:"",ok:false});
  const[loading,setLoading]=useState(false);
  const[timer,setTimer]=useState(0);
  const[resend,setResend]=useState(false);
  const[pinAttempts,setPinAttempts]=useState(0);
  const[pinLockedUntil,setPinLockedUntil]=useState(null);

  useEffect(()=>{
    if(timer<=0){setResend(true);return;}
    const t=setTimeout(()=>setTimer(p=>p-1),1000);
    return()=>clearTimeout(t);
  },[timer]);

  useEffect(()=>{
    if (pinLockedUntil && new Date() < new Date(pinLockedUntil)) {
      const timer = setInterval(() => {
        if (new Date() >= new Date(pinLockedUntil)) {
          setPinLockedUntil(null);
          setPinAttempts(0);
        }
      }, 1000);
      return () => clearInterval(timer);
    }
  }, [pinLockedUntil]);

  async function handleLogin(){
    setMsg({text:"",ok:false});
    
    if (pinLockedUntil && new Date() < new Date(pinLockedUntil)) {
      const remaining = Math.ceil((new Date(pinLockedUntil) - new Date()) / 1000);
      setMsg({text:`Too many attempts. Try again in ${remaining}s`, ok:false});
      return;
    }
    
    if(!otpMode){
      const u=Object.entries(USERS).find(([,v])=>v.number===mobile);
      if(!u){setMsg({text:"Invalid Mobile",ok:false}); return;}
      
      if (pin !== u[1].pin) {
        const newAttempts = pinAttempts + 1;
        setPinAttempts(newAttempts);
        if (newAttempts >= 3) {
          setPinLockedUntil(new Date(Date.now() + 7 * 60000).toISOString());
          setMsg({text:"Too many incorrect PINs. Try again in 7 minutes.", ok:false});
        } else {
          setMsg({text:`Incorrect PIN. ${3 - newAttempts} attempt(s) left.`, ok:false});
        }
        return;
      }
      
      setLoading(true);
      try{
        await fetch(`${API}/send-otp`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mobile})});
        setOtpMode(true);setTimer(30);setResend(false);
        setMsg({text:"OTP sent to your registered mobile 📲",ok:true});
        setPinAttempts(0);
      }catch(e){setMsg({text:"Backend unreachable. Is server running?",ok:false});}
      finally{setLoading(false);}
    }else{
      setLoading(true);
      try{
        const res=await fetch(`${API}/verify-otp`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mobile,otp})});
        const data=await res.json();
        if(data.status==="SUCCESS"){
          setMsg({text:"Login Successful ✔",ok:true});
          const u=Object.entries(USERS).find(([,v])=>v.number===mobile);
          setTimeout(()=>onLogin({...u[1], name: u[0]}),500);
        }else if(data.status==="OTP_EXPIRED"){setMsg({text:"OTP expired. Resend.",ok:false});}
        else{setMsg({text:"Invalid OTP. Try again.",ok:false});}
      }catch(e){setMsg({text:"Backend unreachable. Is server running?",ok:false});}
      finally{setLoading(false);}
    }
  }

  async function handleResend(){
    setTimer(30);setResend(false);
    try{await fetch(`${API}/send-otp`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mobile})});
      setMsg({text:"OTP resent 📲",ok:true});}
    catch(e){setMsg({text:"Server unreachable.",ok:false});}
  }

  const ready=!loading&&((!otpMode&&mobile.length===10&&pin.length===4)||(otpMode&&otp.length===6));

  return(
    <div style={{minHeight:"100vh",backgroundImage:"url('loginbg.jpg')",backgroundSize:"cover",
      backgroundPosition:"center",display:"flex",alignItems:"center",justifyContent:"center",
      position:"relative",fontFamily:"'DM Sans',sans-serif",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,rgba(0,25,80,.75) 0%,rgba(0,80,200,.55) 100%)"}}/>
      <div style={{position:"absolute",top:"6%",right:"10%",width:240,height:240,borderRadius:"50%",
        background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",
        animation:"float 7s ease-in-out infinite"}}/>
      <div style={{position:"absolute",bottom:"10%",left:"6%",width:160,height:160,borderRadius:"50%",
        background:"rgba(0,120,255,.1)",border:"1px solid rgba(0,120,255,.18)",
        animation:"float 9s ease-in-out infinite .6s"}}/>

      <div style={{width:"100%",maxWidth:420,padding:"24px 18px",position:"relative",zIndex:1,animation:"scaleIn .5s cubic-bezier(.16,1,.3,1)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
            width:80,height:80,borderRadius:24,
            background:"rgba(255,255,255,.95)",
            boxShadow:"0 10px 36px rgba(0,0,0,.22)",marginBottom:14}}>
            <img src="favicon.png" alt="PayTrust" style={{width:58,height:58,objectFit:"contain",display:"block"}}/>
          </div>
          <h1 style={{color:"#fff",fontSize:32,fontWeight:800,letterSpacing:"-.5px",marginBottom:5}}>PayTrust</h1>
          <p style={{color:"rgba(255,255,255,.6)",fontSize:15}}>India's most secure payment gateway</p>
        </div>

        <div className="glass" style={{borderRadius:24,padding:"30px 26px"}}>
          <h2 style={{fontSize:19,fontWeight:800,color:"#0f172a",marginBottom:3}}>
            {otpMode?"Verify Identity":"Welcome back"}
          </h2>
          <p style={{fontSize:13,color:"#64748b",marginBottom:22}}>
            {otpMode?"Enter the OTP sent to your mobile":"Sign in to your PayTrust account"}
          </p>

          {!otpMode&&(<>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>Mobile Number</label>
              <div style={{position:"relative"}}>
                <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",
                  fontSize:14,color:"#94a3b8",fontWeight:700,userSelect:"none"}}>+91</span>
                <input type="tel" value={mobile} maxLength={10}
                  onChange={e=>setMobile(e.target.value.replace(/\D/,"").slice(0,10))}
                  placeholder="10-digit number"
                  style={{width:"100%",padding:"11px 12px 11px 44px",borderRadius:10,
                    border:`1.5px solid ${mobile.length===10?"#93c5fd":"#e2e8f0"}`,
                    fontSize:15,outline:"none",boxSizing:"border-box",color:"#0f172a",
                    background:"#f8faff",transition:"border-color .2s",fontFamily:"'DM Sans',sans-serif"}}/>
              </div>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>PIN</label>
              <div style={{position:"relative"}}>
                <input type={showPin?"text":"password"} value={pin} maxLength={4}
                  onChange={e=>setPin(e.target.value.replace(/\D/,"").slice(0,4))}
                  placeholder="••••"
                  style={{width:"100%",padding:"11px 40px 11px 12px",borderRadius:10,
                    border:`1.5px solid ${pin.length===4?"#93c5fd":"#e2e8f0"}`,
                    fontSize:22,letterSpacing:8,outline:"none",boxSizing:"border-box",
                    color:"#0f172a",background:"#f8faff",fontFamily:"'DM Sans',sans-serif"}}/>
                <button onClick={()=>setShowPin(p=>!p)} style={{position:"absolute",right:12,top:"50%",
                  transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",padding:0}}>
                  {showPin?Ic.eyeOff():Ic.eye()}
                </button>
              </div>
            </div>
          </>)}

          {otpMode&&(
            <div style={{marginBottom:20}}>
              <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>6-Digit OTP</label>
              <input type="text" value={otp} maxLength={6}
                onChange={e=>setOtp(e.target.value.replace(/\D/,"").slice(0,6))}
                placeholder="000000"
                style={{width:"100%",padding:"12px 14px",borderRadius:10,
                  border:`1.5px solid ${otp.length===6?"#93c5fd":"#e2e8f0"}`,
                  fontSize:24,letterSpacing:10,outline:"none",boxSizing:"border-box",
                  color:"#0f172a",textAlign:"center",background:"#f8faff",fontFamily:"'DM Sans',sans-serif"}}/>
              <div style={{textAlign:"center",marginTop:10,fontSize:13,color:"#94a3b8"}}>
                {resend
                  ?<button onClick={handleResend} style={{background:"none",border:"none",color:"#0078FF",
                    fontSize:13,cursor:"pointer",fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>
                    Resend OTP →</button>
                  :`Resend in ${timer}s`}
              </div>
            </div>
          )}

          {msg.text&&(
            <div style={{padding:"10px 14px",borderRadius:10,marginBottom:14,fontSize:13,fontWeight:600,
              background:msg.ok?"#f0fdf4":"#fef2f2",color:msg.ok?"#166534":"#dc2626",
              border:`1px solid ${msg.ok?"#bbf7d0":"#fca5a5"}`,animation:"slideDown .25s ease"}}>
              {msg.text}
            </div>
          )}

          <button onClick={handleLogin} disabled={!ready} className="btn-primary"
            style={{width:"100%",padding:"13px",borderRadius:12,border:"none",
              background:ready?`linear-gradient(135deg,#0078FF,#0055cc)`:"#93c5fd",
              color:"#fff",fontWeight:700,fontSize:16,cursor:ready?"pointer":"not-allowed",
              fontFamily:"'DM Sans',sans-serif",letterSpacing:".2px",
              boxShadow:ready?"0 4px 18px rgba(0,120,255,.32)":"none",transition:"all .2s"}}>
            {loading?"Please wait…":otpMode?"Verify & Login →":"Continue →"}
          </button>

          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,
            marginTop:16,fontSize:12,color:"#94a3b8"}}>
            {Ic.shield("#93c5fd")}
            <span>256-bit encrypted · RBI compliant · 2FA secured</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ OTP MODAL ═══ */
function OTPModal({mobile,onSuccess,onCancel}){
  const[digits,setDigits]=useState(["","","","","",""]);
  const[error,setError]=useState(false);
  const[errMsg,setErrMsg]=useState("Invalid OTP.");
  const[timer,setTimer]=useState(30);
  const[resend,setResend]=useState(false);
  const[loading,setLoad]=useState(false);
  const refs=[useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];

  useEffect(()=>{refs[0].current&&refs[0].current.focus();},[]);
  useEffect(()=>{
    if(timer<=0){setResend(true);return;}
    const t=setTimeout(()=>setTimer(p=>p-1),1000);
    return()=>clearTimeout(t);
  },[timer]);

  function type(i,e){
    const v=e.target.value.replace(/\D/,"");
    const d=[...digits];d[i]=v;setDigits(d);
    if(v&&i<5)refs[i+1].current&&refs[i+1].current.focus();
    if(d.every(x=>x))submit(d.join(""));
  }
  function bk(i,e){
    if(e.key==="Backspace"&&!digits[i]&&i>0){
      refs[i-1].current&&refs[i-1].current.focus();
      const d=[...digits];d[i-1]="";setDigits(d);
    }
  }
  async function submit(code){
    setLoad(true);
    try{
      const res=await fetch(`${API}/verify-otp`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mobile,otp:code})});
      const data=await res.json();
      if(data.status==="SUCCESS"){onSuccess();}
      else{
        setErrMsg(data.status==="OTP_EXPIRED"?"OTP expired. Resend.":"Invalid OTP.");
        setError(true);
        setTimeout(()=>{setError(false);setDigits(["","","","","",""]);refs[0].current&&refs[0].current.focus();},750);
      }
    }catch(e){
      setErrMsg("Server unreachable.");setError(true);
      setTimeout(()=>{setError(false);setDigits(["","","","","",""]);},750);
    }finally{setLoad(false);}
  }
  async function resendOTP(){
    setTimer(30);setResend(false);
    try{await fetch(`${API}/send-otp`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mobile})});}catch(e){}
  }

  useEffect(()=>{
    document.body.style.overflow="hidden";
    return()=>{document.body.style.overflow="";};
  },[]);

  return(
    <Modal>
      <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:9999,
        overflowY:"auto",overscrollBehavior:"contain",
        background:"rgba(10,25,70,.65)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)"}}>
        <div style={{minHeight:"100%",display:"flex",alignItems:"center",justifyContent:"center",
          padding:"20px",boxSizing:"border-box"}}>
          <div style={{background:"#fff",borderRadius:24,width:"100%",maxWidth:380,
            boxShadow:"0 32px 80px rgba(0,0,0,.28)",animation:"scaleIn .28s cubic-bezier(.16,1,.3,1)",
            overflow:"hidden",flexShrink:0}}>
            <div style={{background:`linear-gradient(135deg,#0078FF,#0055cc)`,padding:"20px 24px 16px",textAlign:"center"}}>
              <div style={{width:50,height:50,borderRadius:"50%",background:"rgba(255,255,255,.2)",
                display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}}>
                <svg width="24"height="24"viewBox="0 0 48 48">
                  <path d="M24 4L6 12v14c0 12 7.6 23.2 18 26 10.4-2.8 18-14 18-26V12L24 4z"fill="rgba(255,255,255,.2)"stroke="#fff"strokeWidth="2.5"/>
                  <polyline points="16 24 22 30 34 18"fill="none"stroke="#fff"strokeWidth="2.8"strokeLinecap="round"strokeLinejoin="round"/>
                </svg>
              </div>
              <h3 style={{fontWeight:800,fontSize:18,color:"#fff",marginBottom:3}}>OTP Verification</h3>
              <p style={{fontSize:12,color:"rgba(255,255,255,.75)"}}>6-digit code sent to +91 {mobile}</p>
            </div>
            <div style={{padding:"20px 22px 22px"}}>
              <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:12,
                animation:error?"shake .4s ease":"none"}}>
                {digits.map((d,i)=>(
                  <input key={i} ref={refs[i]} maxLength={1} value={d}
                    onChange={e=>type(i,e)} onKeyDown={e=>bk(i,e)}
                    style={{width:44,height:52,textAlign:"center",fontSize:22,fontWeight:700,
                      border:`2px solid ${error?"#fca5a5":d?"#93c5fd":"#e2e8f0"}`,
                      borderRadius:12,outline:"none",color:"#0f172a",fontFamily:"'DM Sans',sans-serif",
                      background:error&&!d?"#fef2f2":d?"#f0f6ff":"#f8faff",
                      transition:"all .15s",boxSizing:"border-box"}}/>
                ))}
              </div>
              {error&&<p style={{color:"#dc2626",textAlign:"center",fontSize:13,marginBottom:10,fontWeight:600}}>{errMsg}</p>}
              {loading&&<p style={{textAlign:"center",fontSize:13,color:"#0078FF",marginBottom:10,fontWeight:600,animation:"pulse 1s infinite"}}>Verifying…</p>}
              <div style={{textAlign:"center",color:"#94a3b8",fontSize:13,marginBottom:16}}>
                {resend
                  ?<button onClick={resendOTP} style={{background:"none",border:"none",color:"#0078FF",
                    fontSize:13,cursor:"pointer",fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>
                    Resend OTP →</button>
                  :`Resend in ${timer}s`}
              </div>
              <Btn onClick={onCancel} variant="ghost" fullWidth>Cancel</Btn>
            </div>
          </div>
        </div>
      </div>
    </Modal>
  );
}

/* ═══ FRAUD RISK CARD with PIN+OTP for suspicious ═══ */
function FraudRiskCard({score, recipient, recipientNum, amount, signals, onVerify, onCancel, onReport, tier, kwMatched=[]}){
  const m=riskMeta(score);
  const R=36,cx=52,cy=52;
  const sa=Math.PI*.75,sw=Math.PI*1.5*(score/100);
  function p2r(a){return{x:cx+R*Math.cos(a),y:cy+R*Math.sin(a)};}
  function arc(from,to){
    const f=p2r(from),t=p2r(to),lg=(to-from)>Math.PI?1:0;
    return`M ${f.x} ${f.y} A ${R} ${R} 0 ${lg} 1 ${t.x} ${t.y}`;
  }
  
  const requiresOTP = tier === 'otp' || tier === 'block';
  
  // Determine the correct title based on tier
  let title = '';
  if (tier === 'normal') title = 'Safe Transaction';
  else if (tier === 'info') title = 'Low Risk Transaction';
  else if (tier === 'otp') title = 'Unusual Payment Detected';
  else if (tier === 'block') title = 'High Risk Transaction';
  
  return(
    <Card style={{padding:0,overflow:"hidden",border:`1.5px solid ${m.border}`}}>
      <div style={{height:4,background:`linear-gradient(90deg,${m.dot},${m.color})`,borderRadius:"18px 18px 0 0"}}/>
      <div style={{padding:"20px 22px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              {Ic.warn(m.dot)}
              <span style={{fontWeight:800,fontSize:15,color:m.color}}>
                {title}
              </span>
            </div>
            <p style={{fontSize:12,color:"#94a3b8"}}>AI Fraud Risk Score</p>
          </div>
          <svg width="88"height="74"viewBox="0 0 104 80">
            <path d={arc(sa,sa+Math.PI*1.5)} fill="none" stroke="#f1f5f9" strokeWidth="10" strokeLinecap="round"/>
            {score>0&&<path d={arc(sa,sa+sw)} fill="none" stroke={m.dot} strokeWidth="10" strokeLinecap="round"/>}
            <text x={cx} y={cy+4} textAnchor="middle" fontSize="20" fontWeight="800" fill={m.color} fontFamily="DM Sans">{score}</text>
            <text x={cx} y={cy+18} textAnchor="middle" fontSize="9" fill="#94a3b8" fontFamily="DM Sans">/100</text>
          </svg>
        </div>
        <div style={{background:"#f8faff",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:13,color:"#64748b"}}>Sending to</span>
            <span style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{recipient}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,color:"#64748b"}}>Amount</span>
            <span style={{fontSize:19,fontWeight:800,color:"#0f172a"}}>₹{Number(amount).toLocaleString("en-IN")}</span>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{height:6,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${score}%`,background:`linear-gradient(90deg,#22c55e,${m.dot})`,
              borderRadius:3,transition:"width .7s cubic-bezier(.4,0,.2,1)"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#cbd5e1",marginTop:3}}>
            <span>Safe</span><span>Low</span><span>Verify</span><span>High</span>
          </div>
        </div>
        {signals&&signals.length>0&&(
          <div style={{marginBottom:14}}>
            <p style={{fontSize:11,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.8,marginBottom:8}}>Signals Detected</p>
            {signals.slice(0,6).map((s,i)=>{
              const isKWSignal = s.startsWith("⚠️");
              const kwBg   = isKWSignal ? "#fff7ed" : m.bg;
              const kwBord = isKWSignal ? "#fdba74" : m.border;
              const kwCol  = isKWSignal ? "#92400e" : m.color;
              const kwDot  = isKWSignal ? "#f59e0b" : m.dot;
              return(
                <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:6,
                  padding:"7px 10px",background:kwBg,borderRadius:8,border:`1px solid ${kwBord}`,
                  animation:`slideInL .2s ${i*.06}s ease both`}}>
                  <svg width="6"height="6"style={{flexShrink:0,marginTop:5}}><circle cx="3"cy="3"r="3"fill={kwDot}/></svg>
                  <span style={{fontSize:13,color:kwCol,fontWeight:isKWSignal?600:500,lineHeight:1.4}}>{s}</span>
                </div>
              );
            })}
            {/* Keyword badge chips */}
            {kwMatched.length>0&&(
              <div style={{marginTop:10,padding:"10px 12px",background:"#fff7ed",borderRadius:10,
                border:"1px solid #fdba74"}}>
                <p style={{fontSize:10,fontWeight:800,color:"#92400e",textTransform:"uppercase",
                  letterSpacing:.7,marginBottom:7}}>🔍 Flagged UPI Keywords</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {kwMatched.map((kw,i)=>{
                    const chipColor = kw.tier==="high"?"#dc2626":kw.tier==="medium"?"#f97316":"#f59e0b";
                    const chipBg   = kw.tier==="high"?"#fef2f2":kw.tier==="medium"?"#fff7ed":"#fefce8";
                    const chipBord = kw.tier==="high"?"#fca5a5":kw.tier==="medium"?"#fdba74":"#fde68a";
                    return(
                      <span key={i} style={{display:"inline-flex",alignItems:"center",gap:4,
                        padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:700,
                        background:chipBg,color:chipColor,border:`1.5px solid ${chipBord}`}}>
                        <svg width="7"height="7"><circle cx="3.5"cy="3.5"r="3.5"fill={chipColor}/></svg>
                        {kw.canonical}
                        <span style={{fontSize:10,opacity:.7,fontWeight:500}}>
                          {kw.tier==="high"?"HIGH":kw.tier==="medium"?"MED":"LOW"}
                        </span>
                      </span>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}
        <div style={{display:"flex",gap:10}}>
          <button onClick={onVerify} className="btn-primary"
            style={{flex:1,padding:"12px",background:`linear-gradient(135deg,#0078FF,#0055cc)`,border:"none",
              borderRadius:12,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",
              fontFamily:"'DM Sans',sans-serif",boxShadow:"0 4px 14px rgba(0,120,255,.28)"}}>
            {requiresOTP ? "Verify with PIN + OTP →" : "Pay with PIN →"}
          </button>
          <button onClick={onReport}
            style={{padding:"12px 18px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:12,
              color:"#dc2626",cursor:"pointer",fontSize:14,fontFamily:"'DM Sans',sans-serif",fontWeight:600,transition:"all .15s"}}
            onMouseEnter={e=>e.target.style.background="#fee2e2"}
            onMouseLeave={e=>e.target.style.background="#fef2f2"}>
            {Ic.flag("#dc2626")} Report
          </button>
        </div>
      </div>
    </Card>
  );
}

/* ═══ COOLDOWN MODAL with working timer ═══ */
function CooldownModal({remaining, reason, onClose}){
  const [seconds, setSeconds] = useState(remaining);
  
  useEffect(() => {
    if (seconds <= 0) {
      onClose();
      return;
    }
    const timer = setInterval(() => setSeconds(s => s - 1), 1000);
    return () => clearInterval(timer);
  }, [seconds, onClose]);
  
  useEffect(() => {
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = ""; };
  }, []);
  
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  
  return (
    <Modal>
      <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:9999,
        background:"rgba(10,25,70,.65)",backdropFilter:"blur(8px)",
        display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:24,maxWidth:380,padding:"30px",textAlign:"center"}}>
          <div style={{width:70,height:70,borderRadius:"50%",background:"#fef2f2",
            display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
            {Ic.warn("#dc2626")}
          </div>
          <h3 style={{fontSize:20,fontWeight:800,color:"#0f172a",marginBottom:8}}>Unusual Activity Detected</h3>
          <p style={{color:"#64748b",marginBottom:16}}>{reason || "Too many rapid small payments detected."}</p>
          <div style={{fontSize:48,fontWeight:800,color:"#0078FF",marginBottom:16,fontFamily:"monospace"}}>
            {mins}:{secs.toString().padStart(2,'0')}
          </div>
          <div style={{width:"100%",height:4,background:"#f1f5f9",borderRadius:2,marginBottom:16}}>
            <div style={{height:"100%",width:`${(seconds/remaining)*100}%`,background:"#0078FF",
              borderRadius:2,transition:"width 1s linear"}}/>
          </div>
          <p style={{fontSize:13,color:"#94a3b8"}}>Please wait before your next transaction</p>
        </div>
      </div>
    </Modal>
  );
}

/* ═══ FREEZE MODAL with working timer ═══ */
function FreezeModal({message, permanent, remaining, onClose}){
  const [seconds, setSeconds] = useState(remaining || 0);
  
  useEffect(() => {
    if (permanent || seconds <= 0) return;
    
    const timer = setInterval(() => {
      setSeconds(s => {
        if (s <= 1) {
          onClose();
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [seconds, permanent, onClose]);
  
  useEffect(() => {
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = ""; };
  }, []);
  
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  
  return (
    <Modal>
      <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:9999,
        background:"rgba(10,25,70,.65)",backdropFilter:"blur(8px)",
        display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:24,maxWidth:380,padding:"30px",textAlign:"center"}}>
          <div style={{width:70,height:70,borderRadius:"50%",background:permanent?"#fef2f2":"#fff7ed",
            display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>

          <h3 style={{fontSize:20,fontWeight:800,color:permanent?"#dc2626":"#f97316",marginBottom:8}}>

          <p style={{color:"#64748b",marginBottom:16}}>{message}</p>

            <>
              <div style={{fontSize:36,fontWeight:800,color:"#0078FF",marginBottom:16,fontFamily:"monospace"}}>

              color:permanent?"#0f172a":"#fff"}}>
            {permanent ? "Contact Support" : "OK"}
          </button>
        </div>
      </div>
    </Modal>
  );
}

/* ═══ SEND MONEY PAGE with PIN+OTP for suspicious ═══ */
function SendMoneyPage({user,balance,addTx,updateBalance,setPage,updateUser}){
  const[recipient, setRecipient] = useState("");
  const[recipientType, setRecipientType] = useState("phone");
  const[amt, setAmt] = useState("");
  const[note, setNote] = useState("");
  const[stage, setStage] = useState("form");
  const[riskData, setRiskData] = useState({score:0,signals:[], action:'allow', tier:'normal', risk:0});
  const[prog, setProg] = useState(0);
  const[lastTx, setLastTx] = useState(null);
  const[balErr, setBalErr] = useState("");
  const[showCooldown, setShowCooldown] = useState(false);
  const[cooldownData, setCooldownData] = useState(null);
  const[showFreeze, setShowFreeze] = useState(false);
  const[freezeData, setFreezeData] = useState(null);

  useEffect(() => {
    const frozen = checkFrozen(user);
    if (frozen.frozen) {
      setFreezeData(frozen);
      setShowFreeze(true);
      return;
    }
    
    const cooldown = checkCooldown(user);
    if (cooldown.cooldown) {
      setCooldownData(cooldown);
      setShowCooldown(true);
    }
  }, [user]);

  const parsedAmt = parseFloat(amt)||0;
  const isInsufficient = parsedAmt>0 && parsedAmt>balance;
  
  const getRecipientInfo = () => {
    if (!recipient) return { name: "", targetNum: "", inUPI: false, inContacts: false, inHistory: false };
    
    let targetNum = recipient;
    if (recipientType === 'upi') {
      const u = Object.entries(USERS).find(([,v]) => v.upi === recipient);
      if (u) targetNum = u[0];
    }
    
    const inUPI = targetNum in USERS;
    const inContacts = targetNum in (user.contacts || {});
    const inHistory = user.known_recipients?.has(targetNum) || false;
    const name = inUPI ? USERS[targetNum].name : (inContacts ? user.contacts[targetNum] : recipient);
    
    return { name, targetNum, inUPI, inContacts, inHistory };
  };

  const isFormReady = recipient && amt && parsedAmt>0 && !isInsufficient;

  function handleAmtChange(v){
    setAmt(v);
    setBalErr("");
  }

  function analyzeRisk(){
    if(!isFormReady) return;
    if(parsedAmt>balance){
      setBalErr(`Insufficient balance. You have ₹${balance.toLocaleString("en-IN")} available.`);
      return;
    }
    
    const { targetNum } = getRecipientInfo();
    if (!targetNum && recipientType === 'phone') {
      setBalErr("Invalid recipient number");
      return;
    }
    
    setStage("analyzing");
    setProg(0);
    
    const t = setInterval(() => setProg(p => {
      if(p>=92){ clearInterval(t); return 92; }
      return p + 7;
    }), 80);
    setTimeout(() => {
      clearInterval(t); setProg(100);
      const ruleResult = calculateRisk(user, parsedAmt, targetNum || recipient);
      if (ruleResult.action === 'cooldown') {
        const cd = applyCooldown(user, ruleResult.signals[0]);
        setCooldownData(cd); setShowCooldown(true); setStage("form"); return;
      }
      // GBM inference: pure JS tree traversal, synchronous
      const mlProb = mlFraudScore(user, parsedAmt, targetNum || recipient);
      const mlSignals = []; let mlAdj = 0;
      if (mlProb !== null) {
        if (mlProb > 0.80) {
          mlSignals.push("\uD83E\uDD16 ML model: " + Math.round(mlProb*100) + "% fraud probability.");
          mlAdj = Math.round(mlProb * 40);
        } else if (mlProb > 0.50) {
          mlSignals.push("\uD83E\uDD16 ML model flagged: " + Math.round(mlProb*100) + "% fraud probability.");
          mlAdj = Math.round(mlProb * 25);
        } else if (mlProb < 0.15) {
          mlAdj = -8; // ML says legit — silently reduce risk, no message shown
        }
      }
      // Keyword Risk Analysis Engine — runs on UPI input
      let kwScore = 0, kwSignals = [], kwMatched = [];
      if (recipientType === 'upi' && recipient) {
        const kwResult = analyzeUPIKeywords(recipient);
        kwScore   = kwResult.keywordScore;
        kwSignals = kwResult.signals;
        kwMatched = kwResult.matchedKeywords;
      }
      // If resolved by phone the recipient UPI is available too
      const resolvedUPI = targetNum && USERS[targetNum] ? USERS[targetNum].upi : null;
      if (recipientType === 'phone' && resolvedUPI && kwScore === 0) {
        const kwResult = analyzeUPIKeywords(resolvedUPI);
        kwScore   = kwResult.keywordScore;
        kwSignals = kwResult.signals;
        kwMatched = kwResult.matchedKeywords;
      }

      const totalRisk = Math.min(100, Math.max(0, user.risk_score + ruleResult.risk + mlAdj + kwScore));
      let tier = 'normal';
      if (totalRisk >= RISK_BLOCK) tier = 'block';
      else if (totalRisk >= RISK_OTP)  tier = 'otp';
      else if (totalRisk >= RISK_INFO) tier = 'info';
      setRiskData({
        score: totalRisk,
        signals: [...ruleResult.signals, ...mlSignals, ...kwSignals],
        action: ruleResult.action, tier, risk: ruleResult.risk,
        kwMatched, kwScore
      });
      setStage("risk");
    }, 1600);
  }

  async function handleVerify(){
    setStage("pin");
  }

  function handlePINSuccess() {
    const requiresOTP = riskData.tier === 'otp' || riskData.tier === 'block';
    if (requiresOTP) {
      setStage("otp");
    } else {
      completePayment();
    }
  }

  function handleOTPSuccess() {
    completePayment();
  }

  function handleReport() {
    const { targetNum } = getRecipientInfo();
    if (targetNum) {
      reportRecipient(user.number, targetNum, parsedAmt, "User reported as suspicious");
    }
    setStage("form");
    setRecipient("");
    setAmt("");
    setNote("");
  }

  function completePayment(){
    const a = parsedAmt;
    const { date, time } = nowStamp();
    const { targetNum, name } = getRecipientInfo();
    
    const otpUsed = riskData.tier === 'otp' || riskData.tier === 'block';
    const status = riskData.tier === 'block' ? 'verified' : 'success';
    
    const tx = {
      id: Date.now(),
      to: name || recipient,
      toNum: targetNum || recipient,
      upi: recipientType === 'upi' ? recipient : (USERS[targetNum]?.upi || ''),
      amt: a,
      date, time,
      risk: riskData.score,
      status,
      type: "debit",
      note: note || "Payment",
      isNew: true,
      risk_tag: riskData.tier,
      otp_used: otpUsed
    };
    
    addTx(tx);
    updateBalance(b => b - a);
    
    if (targetNum && targetNum in USERS) {
      USERS[targetNum].balance += a;
    }
    
    if (targetNum) {
      if (!user.known_recipients) user.known_recipients = new Set();
      user.known_recipients.add(targetNum);
    }
    
    user.risk_score = Math.max(0, user.risk_score + riskData.risk - (otpUsed ? OTP_DISCOUNT : 0));
    if (!user.risk_score_history) user.risk_score_history = [];
    user.risk_score_history.push({
      time: new Date(),
      score: user.risk_score,
      amount: a,
      receiver: targetNum,
      action: riskData.action
    });
    
    setLastTx(tx);
    setStage("success");
    
    if (recordBlock(user)) {
      const freeze = freezeAccount(user, "3 blocked transactions in 5 minutes.");
      setFreezeData(freeze);
      setShowFreeze(true);
    }
  }

  if (showCooldown && cooldownData) {
    return <CooldownModal 
      remaining={cooldownData.remaining}
      reason={cooldownData.reason}
      onClose={() => setShowCooldown(false)}
    />;
  }

  if (showFreeze && freezeData) {
    return <FreezeModal 
      message={freezeData.message || freezeData.reason}
      permanent={freezeData.permanent}

/* ═══ REQUESTS PAGE - FIXED PAYMENT FUNCTIONALITY ═══ */
function RequestsPage({user,requests,resolveRequest,addTx,updateBalance,updateUser}){
  const [localRequests, setLocalRequests] = useState(requests);
  const [verifying, setVerifying] = useState(null);
  const [showFreeze, setShowFreeze] = useState(false);
  const [freezeData, setFreezeData] = useState(null);

  useEffect(() => {
    setLocalRequests(requests);
  }, [requests]);

  useEffect(() => {
    const frozen = checkFrozen(user);
    if (frozen.frozen) {
      setFreezeData(frozen);
      setShowFreeze(true);
    }
  }, [user]);

  function acceptReq(req){
    const result = calculateRisk(user, req.amt, req.fromNum);
    const totalRisk = user.risk_score + result.risk;
    let tier = 'normal';
    if (totalRisk >= RISK_BLOCK) tier = 'block';
    else if (totalRisk >= RISK_OTP) tier = 'otp';
    else if (totalRisk >= RISK_INFO) tier = 'info';
    
    setVerifying({req, result, tier, totalRisk});
  }

  function completeAccept(){
    const { req, result, tier, totalRisk } = verifying;
    const { date, time } = nowStamp();
    
    if (req.amt > user.balance) {
      alert("Insufficient balance to accept this request");
      setVerifying(null);
      return;
    }
    
    const otpUsed = tier === 'otp' || tier === 'block';
    const status = tier === 'block' ? 'verified' : 'success';
    
    const tx = {
      id: Date.now(),
      from: req.from,
      fromNum: req.fromNum,
      upi: req.upi,
      amt: req.amt,
      date, time,
      risk: totalRisk,
      status,
      type: "credit",
      note: req.reason,
      isNew: true,
      risk_tag: tier,
      otp_used: otpUsed
    };
    
    addTx(tx);
    updateBalance(b => b + req.amt);
    
    if (req.fromNum) {
      if (!user.known_recipients) user.known_recipients = new Set();
      user.known_recipients.add(req.fromNum);
    }
    
    user.risk_score = Math.max(0, user.risk_score + result.risk - (otpUsed ? OTP_DISCOUNT : 0));
    
    resolveRequest(req.id, "accepted");
    setLocalRequests(prev => prev.map(r => r.id === req.id ? {...r, status: "accepted"} : r));
    setVerifying(null);
  }

  function declineReq(id){
    resolveRequest(id, "declined");
    setLocalRequests(prev => prev.map(r => r.id === id ? {...r, status: "declined"} : r));
  }
  
  function reportReq(req){
    if (req.fromNum) {
      reportRecipient(user.number, req.fromNum, req.amt, "User reported request as scam");
    }
    resolveRequest(req.id, "reported");
    setLocalRequests(prev => prev.map(r => r.id === req.id ? {...r, status: "reported"} : r));
  }

  const pending = localRequests.filter(r => r.status === "pending");
  const resolved = localRequests.filter(r => r.status !== "pending");

  if (showFreeze && freezeData) {
    return <FreezeModal 
      message={freezeData.message}
      permanent={freezeData.permanent}
      remaining={freezeData.remaining}
      onClose={() => setShowFreeze(false)}
    />;
  }

  return(
    <div className="page-pad page-enter" style={{padding:24,maxWidth:680,margin:"0 auto"}}>
      {verifying && (
        verifying.tier === 'otp' || verifying.tier === 'block' ? (
          <OTPModal
            mobile={user.number}
            onSuccess={completeAccept}
            onCancel={() => setVerifying(null)}
          />
        ) : (
          <PINModal
            userPin={user.pin}
            onSuccess={completeAccept}
            onCancel={() => setVerifying(null)}
          />
        )
      )}

      <div style={{marginBottom:22}}>
        <h2 style={{fontSize:22,fontWeight:800,color:"#0f172a",marginBottom:4}}>Payment Requests</h2>
        <p style={{fontSize:14,color:"#64748b"}}>{pending.length} pending · {resolved.length} resolved</p>
      </div>
      
      {localRequests.length===0&&(
        <Card style={{padding:"40px",textAlign:"center"}}>
          <div style={{color:"#94a3b8",fontSize:15}}>No payment requests.</div>
        </Card>
      )}
      
      {localRequests.map((req,ri)=>{
        const m = riskMeta(req.risk);
        const requiresOTP = req.risk >= RISK_OTP;
        
        return(
          <Card key={req.id} style={{padding:20,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
              <Avatar name={req.from} size={48}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:15,color:"#0f172a"}}>{req.from}</div>
                <div style={{fontSize:13,color:"#94a3b8",marginTop:2}}>{req.upi} · {req.ago}</div>
                <div style={{fontSize:13,color:"#64748b",fontStyle:"italic",marginTop:3}}>"{req.reason}"</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:800,fontSize:22,color:"#0f172a"}}>₹{req.amt.toLocaleString("en-IN")}</div>
                <RiskPill score={req.risk}/>
              </div>
            </div>
            
            {req.status !== "pending" ? (
              <div style={{padding:"10px 16px",background:req.status === "accepted" ? "#dcfce7" : req.status === "declined" ? "#f1f5f9" : "#fef2f2",
                borderRadius:10,color:req.status === "accepted" ? "#166534" : req.status === "declined" ? "#64748b" : "#dc2626",
                fontWeight:700,fontSize:13,textAlign:"center"}}>
                {req.status === "accepted" ? "✓ Accepted" : 
                 req.status === "declined" ? "✗ Declined" : "⚠ Reported"}
              </div>
            ) : (
              <div style={{display:"flex",gap:8,marginTop:12}}>
                <Btn onClick={() => acceptReq(req)} style={{flex:1}}>
                  {requiresOTP ? "Accept with PIN+OTP" : "Accept with PIN"}
                </Btn>
                <Btn onClick={() => declineReq(req.id)} variant="ghost" style={{flex:1}}>Decline</Btn>
                <Btn onClick={() => reportReq(req)} variant="danger">{Ic.flag("#dc2626")} Report</Btn>
              </div>
            )}
          </Card>
        );
      })}
    </div>
  );
}

function XAIExplainCard({user, txs}){
  const lastTx = txs[0];
  if(!lastTx) return null;
  const avg = calculateAvgTransaction(user);
  const std = calculateStdDeviation(user, avg);
  const z   = std>0 ? Math.abs((lastTx.amt - avg)/std) : 0;
  const bal = user.balance;
  const inContacts = lastTx.toNum && (lastTx.toNum in (user.contacts||{}));
  const inHistory  = lastTx.toNum && user.known_recipients?.has(lastTx.toNum);
  const inUPI      = lastTx.toNum && (lastTx.toNum in USERS);
  const spentToday = getDailySpent(user);
  const startBal   = Math.max(bal + spentToday, 1);
  const dailyPct   = ((spentToday + lastTx.amt) / startBal * 100).toFixed(0);

  const reasons = [];
  if(lastTx.amt / Math.max(bal,1) > 0.5) reasons.push({icon:"💸", label:"Unusual Amount", detail:`₹${lastTx.amt.toLocaleString()} is >50% of balance`, risk:"high"});
  if(!inContacts && !inHistory) reasons.push({icon:"👤", label:"New Recipient", detail:"Not in contacts or history", risk:"medium"});
  if(!inUPI) reasons.push({icon:"🌐", label:"Off-Network", detail:"Recipient not in UPI registry", risk:"high"});
  if(z > 2) reasons.push({icon:"📊", label:"Abnormal Amount", detail:`${z.toFixed(1)}σ from your avg (₹${Math.round(avg).toLocaleString()})`, risk:"medium"});
  if(dailyPct > 70) reasons.push({icon:"📅", label:"High Daily Spend", detail:`${dailyPct}% of today's starting balance`, risk:"medium"});
  if(lastTx.risk_tag === "otp" || lastTx.risk_tag === "block") reasons.push({icon:"⏰", label:"High-Risk Transaction", detail:"Required OTP or was blocked", risk:"high"});

  if(reasons.length === 0) reasons.push({icon:"✅", label:"Low Risk Pattern", detail:"No significant anomalies detected", risk:"low"});

  const riskColor = {high:"#dc2626", medium:"#f59e0b", low:"#22c55e"};
  const riskBg    = {high:"#fef2f2", medium:"#fef3c7", low:"#dcfce7"};

  return(
    <div>
      <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>
        Explaining last transaction: <b style={{color:"#0f172a"}}>₹{lastTx.amt.toLocaleString()}</b> to <b style={{color:"#0f172a"}}>{lastTx.to||lastTx.from||"?"}</b>
      </div>
      {reasons.map((r,i)=>(
        <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",
          background:riskBg[r.risk],borderRadius:10,marginBottom:8,
          border:`1px solid ${riskColor[r.risk]}22`}}>
          <span style={{fontSize:16,lineHeight:1}}>{r.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:riskColor[r.risk]}}>{r.label}</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{r.detail}</div>
          </div>
          <span style={{padding:"2px 8px",background:riskColor[r.risk],color:"#fff",
            borderRadius:12,fontSize:10,fontWeight:700,whiteSpace:"nowrap",alignSelf:"center"}}>
            {r.risk.toUpperCase()}
          </span>
        </div>
      ))}
    </div>
  );
}

function EDAPatterns({txs}){
  const fraudTxs  = txs.filter(t=>t.status==="blocked");
  const legitTxs  = txs.filter(t=>t.status!=="blocked");
  const avgFraud  = fraudTxs.length ? Math.round(fraudTxs.reduce((s,t)=>s+t.amt,0)/fraudTxs.length) : 0;
  const avgLegit  = legitTxs.length ? Math.round(legitTxs.reduce((s,t)=>s+t.amt,0)/legitTxs.length) : 0;

  // Hour distribution
  const hourBuckets = {night:0, morning:0, afternoon:0, evening:0};
  txs.forEach(t=>{
    const h = t.time ? parseInt(t.time.split(":")[0]) : 12;
    if(h>=1&&h<5)       hourBuckets.night++;
    else if(h>=5&&h<12) hourBuckets.morning++;
    else if(h>=12&&h<18)hourBuckets.afternoon++;
    else                 hourBuckets.evening++;
  });

  // New recipient fraud rate
  const newRecFraud = txs.filter(t=>t.risk_tag==="block"||t.risk>=85).length;
  const otpTxs      = txs.filter(t=>t.otp_used).length;

  const patterns = [
    {icon:"💰", label:"Avg Blocked Amount", val:`₹${avgFraud.toLocaleString()}`, note:"vs ₹"+avgLegit.toLocaleString()+" legitimate", color:"#dc2626", bg:"#fef2f2"},
    {icon:"🌙", label:"Night-Time Suspicious", val:hourBuckets.night, note:"Txns 1AM–5AM (high-risk window)", color:"#7c3aed", bg:"#f5f3ff"},
    {icon:"👤", label:"High-Risk Flagged", val:newRecFraud, note:"Scored ≥85 risk or blocked", color:"#f59e0b", bg:"#fef3c7"},
    {icon:"🔐", label:"OTP Interventions", val:otpTxs, note:"Extra verification required", color:"#0078FF", bg:"#e8f1ff"},
  ];

  const timeLabels = ["Night (1-5AM)","Morning (5-12)","Afternoon (12-6PM)","Evening (6-1AM)"];
  const timeVals   = [hourBuckets.night, hourBuckets.morning, hourBuckets.afternoon, hourBuckets.evening];
  const timeColors = ["#dc2626","#22c55e","#0078FF","#f59e0b"];
  const maxTime    = Math.max(...timeVals, 1);

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {patterns.map(p=>(
          <div key={p.label} style={{background:p.bg,borderRadius:12,padding:"14px",
            border:`1px solid ${p.color}22`}}>
            <div style={{fontSize:20,marginBottom:4}}>{p.icon}</div>
            <div style={{fontSize:18,fontWeight:800,color:p.color}}>{p.val}</div>
            <div style={{fontSize:11,fontWeight:700,color:p.color,marginBottom:2}}>{p.label}</div>
            <div style={{fontSize:10,color:"#94a3b8"}}>{p.note}</div>
          </div>
        ))}
      </div>
      <div style={{fontWeight:700,fontSize:13,color:"#0f172a",marginBottom:10}}>
        🕐 Time-Based Fraud Pattern
      </div>
      {timeLabels.map((lbl,i)=>(
        <div key={lbl} style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:11,color:"#64748b"}}>{lbl}</span>
            <span style={{fontSize:11,fontWeight:700,color:timeColors[i]}}>{timeVals[i]} txns</span>
          </div>
          <div style={{height:7,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${(timeVals[i]/maxTime)*100}%`,
              background:timeColors[i],borderRadius:4}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

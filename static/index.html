/* ═══ SAFEPAY ASSISTANT with Quick Reply Buttons ═══ */
function SafePayAssistant({onClose}){
  const [messages, setMessages] = useState([
    { role: 'bot', text: "👋 Hello! I'm Nexus, your AI security assistant. I'm here to help with payment safety and fraud concerns. You can ask me about:\n\n• Why was my account frozen?\n• Why was my payment flagged?\n• What is an OTP scam?\n• Is paying through a link safe?\n• How do I report fraud?\n• How do I freeze my account?" }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const messagesEndRef = useRef(null);

  const quickReplies = [
    "Why was my account frozen?",
    "Why was my payment flagged?",
    "What is an OTP scam?",
    "Is paying through a link safe?",
    "How do I report fraud?",
    "How do I freeze my account?",
    "What is a QR code scam?",
    "Safety tips for UPI"
  ];

  const scrollToBottom = () => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  };

  useEffect(scrollToBottom, [messages]);

  const detectIntent = (text) => {
    const words = text.toLowerCase().split(/\s+/);
    
    if (words.some(w => ['qr','qrcode','scan','scanner','camera'].includes(w))) return 'qr_risk';
    if (words.some(w => ['link','whatsapp','sms','browser','website','web','url','click'].includes(w))) return 'link_risk';
    
    if (words.includes('otp') || words.includes('passcode') || 
        (words.includes('code') && words.some(w => ['share','shared','ask','asked','give','gave'].includes(w)))) return 'otp';
    
    const frozenWords = ['frozen','freezed','froze','paused','suspended','locked'];
    const flaggedWords = ['flagged','flag','failed','declined','rejected','stopped','blocked'];
    const paymentWords = ['payment','transaction','transfer','money','send','sent','pay','paid'];
    const accountWords = ['account','acc','profile','wallet'];
    const howWords = ['how','want','should','can','do','need'];
    
    const hasFrozen = words.some(w => frozenWords.includes(w));
    const hasFlagged = words.some(w => flaggedWords.includes(w));
    const hasPayment = words.some(w => paymentWords.includes(w));
    const hasAccount = words.some(w => accountWords.includes(w));
    const hasHow = words.some(w => howWords.includes(w));
    
    if (hasFrozen && !hasPayment) {
      if (hasHow) return 'freeze_how';
      return 'frozen_why';
    }
    
    if (hasFlagged) {
      if (hasPayment && !hasAccount) return 'flagged_why';
      if (hasAccount && !hasPayment) return 'frozen_why';
      return words.some(w => ['payment','transaction','transfer','pay','paid','send','sent'].includes(w)) 
        ? 'flagged_why' : 'frozen_why';
    }
    
    if (hasFrozen) {
      if (hasHow) return 'freeze_how';
      return 'flagged_why';
    }
    
    if (words.some(w => ['freeze','lock','secure','protect','block'].includes(w)) && hasHow) return 'freeze_how';
    if (words.some(w => ['report','complaint','hacked','hack','stolen','cybercrime','lost','fraud'].includes(w))) return 'report';
    if (words.some(w => ['scam','fake','refund','cheat','trick','phish','screen','remote','anydesk','teamviewer','investment','lottery'].includes(w))) return 'scam';
    if (words.some(w => ['suspicious','unusual','activity','detected','alert','risk'].includes(w))) return 'suspicious';
    if (words.some(w => ['safe','safety','protect','security','tip','advice','prevent','avoid'].includes(w))) return 'safety';
    
    return 'fallback';
  };

  const responses = {
    frozen_why: [
      "🚨 **Account Protection Triggered**\n\nYour account was temporarily frozen because the system detected one or more suspicious signals, such as:\n\n• Too many transactions in a very short time\n• A large or unusual payment amount\n• Payment to a new or unverified recipient\n• Multiple failed OTP attempts\n• Login from an unfamiliar device\n\nThis is a temporary safety measure — not a penalty. It lifts automatically after a short time, or you can call us at **1800-123-4567** to verify and restore access."
    ],
    flagged_why: [
      "🔍 **Why Your Payment Was Flagged**\n\nYour payment may have been stopped because:\n\n• The amount was much higher than your usual payments\n• You were sending to someone for the first time\n• The transfer would have used most of your balance\n• Several large payments were made in quick succession\n• The recipient's number has been flagged previously\n\nIf this was a genuine payment, you can proceed after OTP verification. If you did not initiate it — decline immediately and call **1800-123-4567**."
    ],
    qr_risk: [
      "🚨 **Security Warning — External QR Scan**\n\nScanning payment QR codes using external apps (camera, unknown scanners) can be risky:\n\n• Fraudsters sometimes tamper QR codes to redirect payments\n• External scanners cannot verify if a QR belongs to a legitimate merchant\n• This can trigger fraud monitoring alerts\n\n✅ Always scan QR codes using trusted UPI apps only: Google Pay, PhonePe, Paytm, or your bank's app.\n\nIf you suspect a fraudulent QR, call **1800-123-4567**."
    ],
    link_risk: [
      "⚠️ **High-Risk Payment Method Detected**\n\nPayments made through external links — WhatsApp, SMS, browser pages — are high risk:\n\n• Fraudsters send fake payment links that mimic real banking pages\n• Clicking such links can expose your UPI PIN and OTP\n• Banks may temporarily freeze accounts when payments originate from outside trusted UPI apps\n\n✅ Always initiate payments directly inside your bank's official UPI app — never through a link.\n\nSuspicious link received? Call **1800-123-4567**."
    ],
    freeze_how: [
      "🔒 **How to Freeze Your Account**\n\nYou can freeze your account instantly at any time:\n\n• Go to your Profile page\n• Click on 'Emergency Lock' under Security Center\n• This immediately blocks all outgoing transactions\n\nYour balance, history, and requests remain visible. The freeze lifts after a set time, or after you verify your identity at your bank branch.\n\nWhen should you freeze?\n• You received an OTP you did not request\n• You see a transaction you did not make\n• Someone is pressuring you to pay\n\nHelpline: **1800-123-4567** (24×7)"
    ],
    otp: [
      "🔐 **OTP Safety — What You Must Know**\n\nYour OTP authorises real money transfers instantly. Sharing it gives someone complete control over your account.\n\n• No bank, UPI app, or support agent will EVER ask for your OTP\n• There is no 'receive money OTP' — entering any OTP always sends money OUT\n• If you shared an OTP: freeze your account immediately, then call **1800-123-4567**",
      
      "🔐 **Someone Asked for Your OTP?**\n\nThis is almost certainly a fraud attempt. Legitimate bank staff resolve issues without needing your OTP, PIN, or account password.\n\nScammers pose as 'customer support' and create urgency — 'your account will be closed in 1 hour'.\n\nWhat to do right now:\n1. Do NOT share the OTP\n2. End the call\n3. Call us directly: **1800-123-4567**"
    ],
    scam: [
      "⚠️ **Common UPI Scams — Stay Alert**\n\n• **Refund Scam**: Caller offers a refund and asks you to 'receive' it by scanning a QR or entering OTP — you're actually sending money\n• **Fake KYC**: 'Your account will be blocked unless you complete KYC' — leads to a phishing page\n• **Lottery / Prize**: You 'won' money but must pay a small fee first\n\nRule: Legitimate refunds, KYC, and prizes never require you to scan a QR or share an OTP.",
      
      "⚠️ **Remote Access & Screen-Sharing Scams**\n\nA caller asks you to install AnyDesk, TeamViewer, or QuickSupport to 'fix your account'.\n\n• Once installed, they see your entire screen, including any OTP\n• They can initiate payments and approve them without you realising\n• Banks will NEVER ask you to install such apps\n\nIf someone asks you to share your screen: Hang up immediately and call **1800-123-4567**"
    ],
    suspicious: [
      "🔍 **What 'Suspicious Activity' Means**\n\nOur system monitors every payment in real time and compares it against your normal payment behaviour.\n\nActivity is flagged when it matches known fraud patterns — for example:\n• Amount far above your usual transactions\n• Sending to a recipient you've never paid before\n• Payment draining most of your account balance\n• Multiple rapid payments in a short window\n\nA flag is a safety check, not a block. If the payment is genuine, you can confirm it.",
      
      "🔍 **Risk Level Guide**\n\n• Risk 0–39 → Safe (PIN only)\n• Risk 40–69 → Low Risk (PIN only)\n• Risk 70–89 → Verify (PIN + OTP required)\n• Risk 90+ → High Risk (PIN + OTP, flagged)\n\nIf you see a warning and the payment is yours: Proceed after verification. If you did not initiate it: Decline and call **1800-123-4567** immediately."
    ],
    report: [
      "📢 **How to Report Fraud — Act Immediately**\n\nTime is critical. Every minute counts.\n\nStep 1 — Freeze your account now (Profile → Emergency Lock)\nStep 2 — Call National Cyber Crime: **1930** (free, 24×7)\nStep 3 — File online: cybercrime.gov.in\nStep 4 — Call our helpline: **1800-123-4567**\n\nHave ready: transaction ID, amount, time, recipient UPI ID or phone number.",
      
      "📢 **Already Transferred Money to a Scammer?**\n\nDo not panic — act now:\n\n1. Call 1930 immediately (National Cyber Crime)\n2. Call your bank and request a transaction hold\n3. File at cybercrime.gov.in within 24 hours\n4. Note everything: amount, time, UPI ID / phone\n\nBanks can sometimes reverse or freeze funds if the report is made within a few hours."
    ],
    safety: [
      "🛡️ **UPI Safety — Daily Habits That Protect You**\n\n• Verify the recipient name before every payment\n• Set a daily UPI limit in your bank app\n• Never click payment links sent via SMS or WhatsApp\n• Log out of UPI apps on shared devices\n• Review your transaction history regularly\n• Enable biometric lock on your UPI app\n• Use a separate low-balance account for UPI",
      
      "🛡️ **How to Recognise a Safe vs Risky Payment**\n\nSafe: A known contact, agreed amount, paid in app.\nRisky: Unknown number, asking you to scan or share.\nRisky: Payment link sent via SMS, WhatsApp, email.\nRisky: Caller creating urgency ('act in 1 hour').\n\nRule: If you feel pressured — stop and verify.\nRule: When in doubt, call **1800-123-4567**."
    ],
    fallback: [
      "💬 I'm Nexus, your AI security assistant. I'm here to help with payment security. You can ask me things like:\n\n• Why was my account frozen?\n• Why was my payment flagged?\n• What is an OTP scam?\n• Is paying through a link safe?\n• Is scanning a QR with my camera safe?\n• How do I report fraud?\n• How do I freeze my account?\n\nCustomer Support: **1800-123-4567** (24×7)"
    ]
  };

  const lastUsed = {};

  const getResponse = (intent) => {
    const variants = responses[intent] || responses.fallback;
    const last = lastUsed[intent] || -1;
    const available = variants.map((_, i) => i).filter(i => i !== last);
    const idx = available[Math.floor(Math.random() * available.length)];
    lastUsed[intent] = idx;
    return variants[idx];
  };

  const handleSend = async (text) => {
    const userMsg = text || input;
    if (!userMsg.trim() || loading) return;
    
    setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
    setInput("");
    setLoading(true);
    
    setTimeout(() => {
      const intent = detectIntent(userMsg);
      const response = getResponse(intent);
      setMessages(prev => [...prev, { role: 'bot', text: response }]);
      setLoading(false);
    }, 1000);
  };

  const handleQuickReply = (text) => {
    handleSend(text);
  };

  return (
    <Modal>
      <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:9999,
        background:"rgba(10,25,70,.65)",backdropFilter:"blur(8px)",
        display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
        <div style={{background:"#fff",borderRadius:24,width:"100%",maxWidth:450,
          maxHeight:"80vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
          
          <div style={{background:`linear-gradient(135deg,#0078FF,#0055cc)`,padding:"16px 20px",
            display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:40,height:40,borderRadius:"50%",background:"rgba(255,255,255,.2)",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:900,
                color:"#fff",fontFamily:"'Arial Black', 'Impact', sans-serif",textShadow:"2px 2px 4px rgba(0,0,0,0.3)",
                letterSpacing:"1px"}}>
                N
              </div>
              <div>
                <div style={{color:"#fff",fontWeight:800,fontSize:15}}>Nexus</div>
                <div style={{color:"rgba(255,255,255,.7)",fontSize:11}}>AI Security Assistant</div>
              </div>
            </div>
            <button onClick={onClose} style={{background:"none",border:"none",color:"#fff",cursor:"pointer"}}>
              <svg width="20"height="20"viewBox="0 0 24 24"fill="none"stroke="#fff"strokeWidth="2.5"><line x1="18"y1="6"x2="6"y2="18"/><line x1="6"y1="6"x2="18"y2="18"/></svg>
            </button>
          </div>
          
          <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:"12px"}}>
            {messages.map((msg, i) => (
              <div key={i} style={{display:"flex",flexDirection:"column",alignItems:msg.role==='user'?'flex-end':'flex-start'}}>
                <div style={{maxWidth:"80%",padding:"10px 14px",borderRadius:msg.role==='user'?'16px 16px 4px 16px':'4px 16px 16px 16px',
                  background:msg.role==='user'?`linear-gradient(135deg,#0078FF,#0055cc)`:'#f1f5f9',
                  color:msg.role==='user'?'#fff':'#0f172a',whiteSpace:"pre-wrap",fontSize:14,lineHeight:1.5}}>
                  {msg.text.split('\n').map((line, j) => (
                    <div key={j}>{line}</div>
                  ))}
                </div>
                <div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>
                  {new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
                </div>
              </div>
            ))}
            
            {/* Quick Reply Buttons */}
            {messages.length < 3 && (
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:8,marginBottom:8}}>
                {quickReplies.map((qr, idx) => (
                  <button
                    key={idx}
                    className="quick-reply-btn"
                    onClick={() => handleQuickReply(qr)}
                    disabled={loading}
                  >
                    {qr}
                  </button>
                ))}
              </div>
            )}
            
            {loading && (
              <div style={{display:"flex",gap:5,padding:"10px"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#94a3b8",animation:"blink 1s infinite"}}/>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#94a3b8",animation:"blink 1s infinite .2s"}}/>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#94a3b8",animation:"blink 1s infinite .4s"}}/>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>
          
          <div style={{padding:"12px",borderTop:"1px solid #f1f5f9",display:"flex",gap:8}}>
            <input
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && handleSend()}
              placeholder="Ask about fraud safety..."
              style={{flex:1,padding:"10px 14px",border:"1.5px solid #e2e8f0",borderRadius:22,
                fontSize:13,outline:"none",fontFamily:"'DM Sans',sans-serif"}}
            />
            <button onClick={() => handleSend()} disabled={!input.trim() || loading}
              style={{width:40,height:40,borderRadius:"50%",background:`linear-gradient(135deg,#0078FF,#0055cc)`,
                border:"none",cursor:loading?"not-allowed":"pointer",opacity:loading?0.5:1,
                display:"flex",alignItems:"center",justifyContent:"center"}}>
              <svg width="16"height="16"viewBox="0 0 24 24"fill="none"stroke="#fff"strokeWidth="2.5">
                <line x1="22"y1="2"x2="11"y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </Modal>
  );
}

/* ═══ ROOT APP ═══ */
function App(){
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [txs, setTxs] = useState(SEED_TXS);
  const [balance, setBalance] = useState(0);
  const [requests, setRequests] = useState(SEED_REQS);
  const [showAssistant, setShowAssistant] = useState(false);
  const [showRBIGuideline, setShowRBIGuideline] = useState(true);

  function handleLogin(u){
    setUser(u);
    setBalance(u.balance);
    setTxs(SEED_TXS);
    setRequests(SEED_REQS);
  }

  function addTx(tx){
    setTxs(prev => [tx, ...prev]);
  }

  function updateBalance(fn){
    setBalance(prev => Math.max(0, fn(prev)));
  }

  function resolveRequest(id, status){
    setRequests(prev => prev.map(r => r.id === id ? {...r, status} : r));
  }

  function updateUser(updates){
    setUser(prev => ({...prev, ...updates}));
  }

  const pendingCount = requests.filter(r => r.status === "pending").length;

  if(!user) return <LoginPage onLogin={handleLogin}/>;

  const pp = {user, txs, balance, setPage, addTx, updateBalance, requests, resolveRequest, updateUser};

  return (
    <div style={{display:"flex",minHeight:"100vh",fontFamily:"'DM Sans',sans-serif",
      backgroundImage:"url('loginbg.jpg')",backgroundSize:"cover",backgroundPosition:"center",
      backgroundAttachment:"fixed",position:"relative"}}>
      <div style={{position:"fixed",inset:0,background:"rgba(240,246,255,.93)",zIndex:0}}/>
      <div style={{position:"relative",zIndex:1,display:"flex",width:"100%"}}>
        <Sidebar page={page} setPage={setPage} user={user}
          onLogout={()=>{setUser(null);setPage("dashboard");}} pendingCount={pendingCount}/>
        <main id="main-content" style={{flex:1,overflowY:"auto",maxHeight:"100vh",position:"relative"}}>
          <div key={page}>
            {page === "dashboard" && <Dashboard {...pp}/>}
            {page === "send" && <SendMoneyPage {...pp}/>}
            {page === "requests" && <RequestsPage {...pp}/>}
            {page === "history" && <HistoryPage {...pp}/>}
            {page === "insights" && <InsightsPage {...pp}/>}
            {page === "profile" && <ProfilePage {...pp}/>}
          </div>
          
          <button
            onClick={() => setShowAssistant(true)}
            style={{position:"fixed",bottom:28,right:28,zIndex:100,
              width:60,height:60,borderRadius:"50%",background:`linear-gradient(135deg,#0078FF,#0055cc)`,
              border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
              boxShadow:"0 6px 28px rgba(0,120,255,.45)",color:"#fff",fontSize:24,fontWeight:800}}>
            N
          </button>
        </main>
        <BottomNav page={page} setPage={setPage} pendingCount={pendingCount}/>
      </div>
      
      {showAssistant && <SafePayAssistant onClose={() => setShowAssistant(false)}/>}
      {showRBIGuideline && <RBIGuidelineModal onClose={() => setShowRBIGuideline(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>

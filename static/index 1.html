function XAIExplainCard({user, txs}){
  const lastTx = txs[0];
  if(!lastTx) return null;
  const avg = calculateAvgTransaction(user);
  const std = calculateStdDeviation(user, avg);
  const z   = std>0 ? Math.abs((lastTx.amt - avg)/std) : 0;
  const bal = user.balance;
  const inContacts = lastTx.toNum && (lastTx.toNum in (user.contacts||{}));
  const inHistory  = lastTx.toNum && user.known_recipients?.has(lastTx.toNum);
  const inUPI      = lastTx.toNum && (lastTx.toNum in USERS);
  const spentToday = getDailySpent(user);
  const startBal   = Math.max(bal + spentToday, 1);
  const dailyPct   = ((spentToday + lastTx.amt) / startBal * 100).toFixed(0);

  const reasons = [];
  if(lastTx.amt / Math.max(bal,1) > 0.5) reasons.push({icon:"💸", label:"Unusual Amount", detail:`₹${lastTx.amt.toLocaleString()} is >50% of balance`, risk:"high"});
  if(!inContacts && !inHistory) reasons.push({icon:"👤", label:"New Recipient", detail:"Not in contacts or history", risk:"medium"});
  if(!inUPI) reasons.push({icon:"🌐", label:"Off-Network", detail:"Recipient not in UPI registry", risk:"high"});
  if(z > 2) reasons.push({icon:"📊", label:"Abnormal Amount", detail:`${z.toFixed(1)}σ from your avg (₹${Math.round(avg).toLocaleString()})`, risk:"medium"});
  if(dailyPct > 70) reasons.push({icon:"📅", label:"High Daily Spend", detail:`${dailyPct}% of today's starting balance`, risk:"medium"});
  if(lastTx.risk_tag === "otp" || lastTx.risk_tag === "block") reasons.push({icon:"⏰", label:"High-Risk Transaction", detail:"Required OTP or was blocked", risk:"high"});

  if(reasons.length === 0) reasons.push({icon:"✅", label:"Low Risk Pattern", detail:"No significant anomalies detected", risk:"low"});

  const riskColor = {high:"#dc2626", medium:"#f59e0b", low:"#22c55e"};
  const riskBg    = {high:"#fef2f2", medium:"#fef3c7", low:"#dcfce7"};

  return(
    <div>
      <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>
        Explaining last transaction: <b style={{color:"#0f172a"}}>₹{lastTx.amt.toLocaleString()}</b> to <b style={{color:"#0f172a"}}>{lastTx.to||lastTx.from||"?"}</b>
      </div>
      {reasons.map((r,i)=>(
        <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",
          background:riskBg[r.risk],borderRadius:10,marginBottom:8,
          border:`1px solid ${riskColor[r.risk]}22`}}>
          <span style={{fontSize:16,lineHeight:1}}>{r.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:riskColor[r.risk]}}>{r.label}</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{r.detail}</div>
          </div>
          <span style={{padding:"2px 8px",background:riskColor[r.risk],color:"#fff",
            borderRadius:12,fontSize:10,fontWeight:700,whiteSpace:"nowrap",alignSelf:"center"}}>
            {r.risk.toUpperCase()}
          </span>
        </div>
      ))}
    </div>
  );
}

function EDAPatterns({txs}){
  const fraudTxs  = txs.filter(t=>t.status==="blocked");
  const legitTxs  = txs.filter(t=>t.status!=="blocked");
  const avgFraud  = fraudTxs.length ? Math.round(fraudTxs.reduce((s,t)=>s+t.amt,0)/fraudTxs.length) : 0;
  const avgLegit  = legitTxs.length ? Math.round(legitTxs.reduce((s,t)=>s+t.amt,0)/legitTxs.length) : 0;

  // Hour distribution
  const hourBuckets = {night:0, morning:0, afternoon:0, evening:0};
  txs.forEach(t=>{
    const h = t.time ? parseInt(t.time.split(":")[0]) : 12;
    if(h>=1&&h<5)       hourBuckets.night++;
    else if(h>=5&&h<12) hourBuckets.morning++;
    else if(h>=12&&h<18)hourBuckets.afternoon++;
    else                 hourBuckets.evening++;
  });

  // New recipient fraud rate
  const newRecFraud = txs.filter(t=>t.risk_tag==="block"||t.risk>=85).length;
  const otpTxs      = txs.filter(t=>t.otp_used).length;

  const patterns = [
    {icon:"💰", label:"Avg Blocked Amount", val:`₹${avgFraud.toLocaleString()}`, note:"vs ₹"+avgLegit.toLocaleString()+" legitimate", color:"#dc2626", bg:"#fef2f2"},
    {icon:"🌙", label:"Night-Time Suspicious", val:hourBuckets.night, note:"Txns 1AM–5AM (high-risk window)", color:"#7c3aed", bg:"#f5f3ff"},
    {icon:"👤", label:"High-Risk Flagged", val:newRecFraud, note:"Scored ≥85 risk or blocked", color:"#f59e0b", bg:"#fef3c7"},
    {icon:"🔐", label:"OTP Interventions", val:otpTxs, note:"Extra verification required", color:"#0078FF", bg:"#e8f1ff"},
  ];

  const timeLabels = ["Night (1-5AM)","Morning (5-12)","Afternoon (12-6PM)","Evening (6-1AM)"];
  const timeVals   = [hourBuckets.night, hourBuckets.morning, hourBuckets.afternoon, hourBuckets.evening];
  const timeColors = ["#dc2626","#22c55e","#0078FF","#f59e0b"];
  const maxTime    = Math.max(...timeVals, 1);

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {patterns.map(p=>(
          <div key={p.label} style={{background:p.bg,borderRadius:12,padding:"14px",
            border:`1px solid ${p.color}22`}}>
            <div style={{fontSize:20,marginBottom:4}}>{p.icon}</div>
            <div style={{fontSize:18,fontWeight:800,color:p.color}}>{p.val}</div>
            <div style={{fontSize:11,fontWeight:700,color:p.color,marginBottom:2}}>{p.label}</div>
            <div style={{fontSize:10,color:"#94a3b8"}}>{p.note}</div>
          </div>
        ))}
      </div>
      <div style={{fontWeight:700,fontSize:13,color:"#0f172a",marginBottom:10}}>
        🕐 Time-Based Fraud Pattern
      </div>
      {timeLabels.map((lbl,i)=>(
        <div key={lbl} style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:11,color:"#64748b"}}>{lbl}</span>
            <span style={{fontSize:11,fontWeight:700,color:timeColors[i]}}>{timeVals[i]} txns</span>
          </div>
          <div style={{height:7,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${(timeVals[i]/maxTime)*100}%`,
              background:timeColors[i],borderRadius:4}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

  const riskHistory = user.risk_score_history || [];

  function resetPin(){
    if(!pd.cur){setMsg("Please enter your current PIN.");return;}
    if(pd.cur!==user.pin){setMsg("Current PIN is incorrect.");return;}
    if(pd.n1.length<4){setMsg("New PIN must be exactly 4 digits.");return;}
    if(pd.n1!==pd.n2){setMsg("New PIN and Confirm PIN do not match.");return;}
    if(pd.n1===pd.cur){setMsg("New PIN must be different from current PIN.");return;}
    updateUser({pin:pd.n1});
    setMsg("PIN updated successfully ✔");
    setPd({cur:"",n1:"",n2:""});
    setTimeout(()=>setMsg(""),3000);

function RequestMoneyPage({user, setPage}){
  const [recipient, setRecipient] = useState("");
  const [recipientType, setRecipientType] = useState("phone");
  const [amt, setAmt] = useState("");
  const [note, setNote] = useState("");

  const [sentRequests, setSentRequests] = useState([]);

  const parsedAmt = parseFloat(amt) || 0;

  const getRecipientInfo = () => {
    let targetNum = recipient;
    if (recipientType === 'upi') {
      const u = Object.entries(USERS).find(([,v]) => v.upi === recipient);
      if (u) targetNum = u[0];
    }
    const inSystem = targetNum in USERS;
    const name = inSystem ? USERS[targetNum].name : recipient;
    return { targetNum, name, inSystem };
  };

  const { name: recipName, inSystem } = recipient ? getRecipientInfo() : { name: "", inSystem: false };
  const isReady = recipient && parsedAmt > 0 && note.trim();

  function sendRequest() {
    if (!isReady) return;
    const { targetNum, name } = getRecipientInfo();
    const { date, time } = nowStamp();
    const newReq = {
      id: Date.now(),
      to: name || recipient,
      toNum: targetNum,
      upi: inSystem ? USERS[targetNum]?.upi : recipient,
      amt: parsedAmt,
      reason: note,
      date,
      time,
      status: "pending",

        <p style={{fontSize:12,color:"#94a3b8",marginBottom:24}}>

        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>{setStage("form");setRecipient("");setAmt("");setNote("");}} variant="primary" style={{flex:1}}>

function useToast(){
  const[toast,setToast]=useState(null);
  function showToast(msg,ms=2500){
    setToast(msg);
    setTimeout(()=>setToast(null),ms);
  }
  const ToastEl=toast?(
    <div className="pt-toast">{toast}</div>
  ):null;
  return{showToast,ToastEl};
}

// ===== FEATURE 6: RISK EXPLAINER TAGS =====
function RiskExplainer({tx, user}){
  if(!tx) return null;
  const avg=calculateAvgTransaction(user);
  const tags=[];
  const inContacts=tx.toNum&&(tx.toNum in(user.contacts||{}));
  const inHistory=tx.toNum&&user.known_recipients?.has(tx.toNum);
  const inUPI=tx.toNum&&(tx.toNum in USERS);

  if(tx.amt>avg*3) tags.push({label:`${Math.round(tx.amt/Math.max(avg,1))}× your avg amount`,color:"#dc2626",bg:"#fef2f2",border:"#fca5a5"});
  if(!inContacts&&!inHistory&&tx.type==="debit") tags.push({label:"New recipient",color:"#f59e0b",bg:"#fef3c7",border:"#fcd34d"});
  if(!inUPI&&tx.type==="debit") tags.push({label:"Off-network recipient",color:"#dc2626",bg:"#fef2f2",border:"#fca5a5"});
  const h=tx.time?parseInt(tx.time.split(":")[0]):12;
  if(h>=1&&h<5) tags.push({label:"Late-night (1–5AM)",color:"#7c3aed",bg:"#f5f3ff",border:"#c4b5fd"});
  if(tx.otp_used) tags.push({label:"OTP verified",color:"#22c55e",bg:"#dcfce7",border:"#86efac"});
  if(tx.status==="blocked") tags.push({label:"Blocked — high risk",color:"#dc2626",bg:"#fef2f2",border:"#fca5a5"});
  const recRisk=getRecipientRisk(tx.toNum||"");
  if(recRisk>=2) tags.push({label:`Flagged ${recRisk}× network-wide`,color:"#dc2626",bg:"#fef2f2",border:"#fca5a5"});
  if(tx.risk<40&&!tags.length) tags.push({label:"Low risk",color:"#22c55e",bg:"#dcfce7",border:"#86efac"});

  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:6}}>
      {tags.map((t,i)=>(
        <span key={i} className="risk-tag"
          style={{color:t.color,background:t.bg,borderColor:t.border,fontSize:10,padding:"3px 9px",borderRadius:14,fontWeight:700}}>
          {t.label}
        </span>
      ))}
    </div>
  );
}

}

function SafePayAssistant({onClose, user}){
  const [messages, setMessages] = useState([
    { role: 'bot', text: "👋 Hello! I'm Nexus, your AI security assistant. I'm here to help with payment safety and fraud concerns. You can ask me about:\n\n• Why was my account frozen?\n• Why was my payment flagged?\n• What is an OTP scam?\n• Is paying through a link safe?\n• How do I report fraud?\n• How do I freeze my account?" }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const messagesEndRef = useRef(null);

  const quickReplies = [
    "Is this payment safe?",
    "Explain my risk score",
    "Why was my payment blocked?",
    "Why was my account frozen?",
    "What is an OTP scam?",
    "Is this UPI ID safe?",
    "How do I report fraud?",
    "Safety tips for UPI"
  ];

  const scrollToBottom = () => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  };

  useEffect(scrollToBottom, [messages]);

  const detectIntent = (text) => {
    const words = text.toLowerCase().split(/\s+/);
    const t = text.toLowerCase();
    // Context-aware intents
    if(t.includes('risk score')||t.includes('explain score')||(words.includes('explain')&&words.some(w=>['risk','score','fraud'].includes(w)))) return 'explain_risk';
    if(t.includes('blocked')||(words.includes('payment')&&words.includes('blocked'))) return 'flagged_why';
    if(t.includes('upi id')||(words.includes('upi')&&words.some(w=>['safe','check','verify','legit'].includes(w)))) return 'upi_check';
    if(words.some(w=>['safe','safe?'].includes(w))&&words.some(w=>['payment','transaction','transfer','pay'].includes(w))) return 'payment_safe';
    if(t.includes('is this payment safe')||t.includes('is this safe')) return 'payment_safe';

    if (words.some(w => ['qr','qrcode','scan','scanner','camera'].includes(w))) return 'qr_risk';
    if (words.some(w => ['link','whatsapp','sms','browser','website','web','url','click'].includes(w))) return 'link_risk';

    if (words.includes('otp') || words.includes('passcode') ||
        (words.includes('code') && words.some(w => ['share','shared','ask','asked','give','gave'].includes(w)))) return 'otp';

    const frozenWords = ['frozen','freezed','froze','paused','suspended','locked'];
    const flaggedWords = ['flagged','flag','failed','declined','rejected','stopped','blocked'];
    const paymentWords = ['payment','transaction','transfer','money','send','sent','pay','paid'];
    const accountWords = ['account','acc','profile','wallet'];
    const howWords = ['how','want','should','can','do','need'];

    const hasFrozen = words.some(w => frozenWords.includes(w));
    const hasFlagged = words.some(w => flaggedWords.includes(w));
    const hasPayment = words.some(w => paymentWords.includes(w));
    const hasAccount = words.some(w => accountWords.includes(w));
    const hasHow = words.some(w => howWords.includes(w));

    if (hasFrozen && !hasPayment) {
      if (hasHow) return 'freeze_how';
      return 'frozen_why';
    }
    if (hasFlagged) {
      if (hasPayment && !hasAccount) return 'flagged_why';
      if (hasAccount && !hasPayment) return 'frozen_why';
      return words.some(w => ['payment','transaction','transfer','pay','paid','send','sent'].includes(w))
        ? 'flagged_why' : 'frozen_why';
    }
    if (hasFrozen) {
      if (hasHow) return 'freeze_how';
      return 'flagged_why';
    }
    if (words.some(w => ['freeze','lock','secure','protect','block'].includes(w)) && hasHow) return 'freeze_how';
    if (words.some(w => ['report','complaint','hacked','hack','stolen','cybercrime','lost','fraud'].includes(w))) return 'report';
    if (words.some(w => ['scam','fake','refund','cheat','trick','phish','screen','remote','anydesk','teamviewer','investment','lottery'].includes(w))) return 'scam';
    if (words.some(w => ['suspicious','unusual','activity','detected','alert','risk'].includes(w))) return 'suspicious';
    if (words.some(w => ['safe','safety','protect','security','tip','advice','prevent','avoid'].includes(w))) return 'safety';

    return 'fallback';
  };

  // ===== NEW: Build a real-time payment safety analysis from user context =====
  function buildPaymentSafetyResponse() {
    if (!user) return "I don't have context about your current transaction. Please describe the payment — who you're paying, the amount, and why — and I'll analyse it for you.";
    const riskScore = user.risk_score || 0;
    const freezeLevel = getFreezeLevel(user);
    const freezeLbl = getFreezeLevelLabel(freezeLevel);
    const reasons = [];
    const warnings = [];

    if (riskScore >= 70) warnings.push("Your account risk score is elevated (" + riskScore + "/100)");
    if (freezeLevel >= 2) warnings.push("Your account has active restrictions: " + freezeLbl);
    if ((user.bypass_attempts||0) >= 1) warnings.push("Recent bypass attempts detected on your account");

    const avgAmt = calculateAvgTransaction(user);
    reasons.push("Your average transaction amount is ₹" + Math.round(avgAmt).toLocaleString("en-IN"));

    const hvThreshold = getHighValueThreshold(user);
    reasons.push("High-value threshold for your profile: ₹" + Math.round(hvThreshold).toLocaleString("en-IN") + " (based on your age " + (user.age||"unknown") + ")");

    if (user.verified) reasons.push("✅ Your account is KYC verified — lower base risk");
    else reasons.push("⚠️ Account not fully verified — higher caution advised");

    const safetyTips = [
      "Always verify the recipient name before confirming",
      "Never pay if someone is pressuring you urgently",
      "Transactions above ₹" + Math.round(hvThreshold).toLocaleString("en-IN") + " will trigger a 10-second review delay",
      "New recipients always require PIN verification",
    ];

    let result = "🛡️ **Real-Time Payment Safety Check**\n\n";
    result += "**Your Account Profile:**\n" + reasons.map(r => "• " + r).join("\n") + "\n\n";
    if (warnings.length > 0) {
      result += "**⚠️ Active Warnings:**\n" + warnings.map(w => "• " + w).join("\n") + "\n\n";
    }
    result += "**Safety Reminders for This Session:**\n" + safetyTips.map(t => "• " + t).join("\n") + "\n\n";
    result += "For specific transaction analysis, tell me: the amount, recipient, and reason — and I'll give you a risk assessment.";
    return result;
  }

  }

  const responses = {
    // ===== NEW: Payment safety intent =====

    ],
    frozen_why: [
      "🚨 **Account Protection Triggered**\n\nYour account was temporarily frozen because the system detected one or more suspicious signals, such as:\n\n• Too many transactions in a very short time\n• A large or unusual payment amount\n• Payment to a new or unverified recipient\n• Multiple failed OTP attempts\n• Login from an unfamiliar device\n\nThis is a temporary safety measure — not a penalty. It lifts automatically after a short time, or you can call us at **1800-123-4567** to verify and restore access."
    ],
    flagged_why: [

    qr_risk: [

    ],
    link_risk: [

  };

  const lastUsed = {};

  const getResponse = (intent) => {
    const variants = responses[intent] || responses.fallback;
    const last = lastUsed[intent] || -1;
    const available = variants.map((_, i) => i).filter(i => i !== last);
    const idx = available[Math.floor(Math.random() * available.length)];
    lastUsed[intent] = idx;
    return variants[idx];
  };

              onKeyDown={(e) => e.key === 'Enter' && handleSend()}
              placeholder="Ask about fraud safety..."
              style={{flex:1,padding:"10px 14px",border:"1.5px solid #e2e8f0",borderRadius:22,
                fontSize:13,outline:"none",fontFamily:"'DM Sans',sans-serif"}}
            />
            <button onClick={() => handleSend()} disabled={!input.trim() || loading}
              style={{width:40,height:40,borderRadius:"50%",background:`linear-gradient(135deg,#0078FF,#0055cc)`,
                border:"none",cursor:loading?"not-allowed":"pointer",opacity:loading?0.5:1,
                display:"flex",alignItems:"center",justifyContent:"center"}}>
              <svg width="16"height="16"viewBox="0 0 24 24"fill="none"stroke="#fff"strokeWidth="2.5">
                <line x1="22"y1="2"x2="11"y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </Modal>
  );
}

/* ═══ ROOT APP ═══ */
function App(){
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [txs, setTxs] = useState(SEED_TXS);
  const [balance, setBalance] = useState(0);
  const [requests, setRequests] = useState(SEED_REQS);
  const [showAssistant, setShowAssistant] = useState(false);
  const [showRBIGuideline, setShowRBIGuideline] = useState(true);

  function handleLogin(u){
    setUser(u);
    setBalance(u.balance);
    setTxs(SEED_TXS);
    setRequests(SEED_REQS);
  }

  function addTx(tx){
    setTxs(prev => [tx, ...prev]);
  }

  function updateBalance(fn){
    setBalance(prev => Math.max(0, fn(prev)));
  }

  function resolveRequest(id, status){
    setRequests(prev => prev.map(r => r.id === id ? {...r, status} : r));
  }

  function updateUser(updates){
    setUser(prev => ({...prev, ...updates}));
  }

  const pendingCount = requests.filter(r => r.status === "pending").length;

  if(!user) return <LoginPage onLogin={handleLogin}/>;

  const pp = {user, txs, balance, setPage, addTx, updateBalance, requests, resolveRequest, updateUser};

  return (
    <div style={{display:"flex",minHeight:"100vh",fontFamily:"'DM Sans',sans-serif",
      backgroundImage:"url('loginbg.jpg')",backgroundSize:"cover",backgroundPosition:"center",
      backgroundAttachment:"fixed",position:"relative"}}>
      <div style={{position:"fixed",inset:0,background:"rgba(240,246,255,.93)",zIndex:0}}/>
      <div style={{position:"relative",zIndex:1,display:"flex",width:"100%"}}>
        <Sidebar page={page} setPage={setPage} user={user}
          onLogout={()=>{setUser(null);setPage("dashboard");}} pendingCount={pendingCount}/>
        <main id="main-content" style={{flex:1,overflowY:"auto",maxHeight:"100vh",position:"relative"}}>
          <div key={page}>
            {page === "dashboard"     && <Dashboard {...pp}/>}
            {page === "send"          && <SendMoneyPage {...pp}/>}
            {page === "request-money" && <RequestMoneyPage {...pp}/>}
            {page === "requests"      && <RequestsPage {...pp}/>}
            {page === "history"       && <HistoryPage txs={txs} user={user}/>}
            {page === "finance"       && <FinanceAnalyticsPage txs={txs} user={user}/>}
            {page === "insights"      && <InsightsPage {...pp}/>}
            {page === "profile"       && <ProfilePage {...pp}/>}
          </div>

          <button
            onClick={() => setShowAssistant(true)}
            style={{position:"fixed",bottom:28,right:28,zIndex:100,
              width:60,height:60,borderRadius:"50%",background:`linear-gradient(135deg,#0078FF,#0055cc)`,
              border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
              boxShadow:"0 6px 28px rgba(0,120,255,.45)"}}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
        </main>
        <BottomNav page={page} setPage={setPage} pendingCount={pendingCount}/>
      </div>

      {showAssistant && <SafePayAssistant user={user} onClose={() => setShowAssistant(false)}/>}
      {showRBIGuideline && <RBIGuidelineModal onClose={() => setShowRBIGuideline(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
